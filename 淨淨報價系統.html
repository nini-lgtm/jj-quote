<script>
async function sha256(str){
  var buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,'0')}).join('');
}
var _H='35f0fe053efba23746502e427f547856d115174e27c4c1e564f8e050a77f328c';
// 閒置超時 (分鐘)，存 localStorage 讓下次重訪記得設定
var IDLE_KEY='jj_idle_min';
var ACT_KEY='jj_last_activity';
function getIdleMin(){return parseInt(localStorage.getItem(IDLE_KEY)||'30',10)}
function setIdleMin(n){localStorage.setItem(IDLE_KEY,String(n))}
function touchActivity(){localStorage.setItem(ACT_KEY,String(Date.now()))}
async function checkPw(){
  var pw=document.getElementById('pw-input').value;
  var h=await sha256(pw);
  if(h===_H){
    var m=parseInt(document.getElementById('idle-sel').value,10);
    setIdleMin(m);
    localStorage.setItem('jj_unlocked','1');
    touchActivity();
    document.getElementById('lock-screen').style.display='none';
    startIdleWatch();
  }else{
    document.getElementById('pw-err').textContent='密碼錯誤，請重新輸入';
    document.getElementById('pw-input').value='';
    document.getElementById('pw-input').focus();
  }
}
function lockNow(){
  localStorage.removeItem('jj_unlocked');
  document.getElementById('lock-screen').style.display='flex';
  document.getElementById('pw-input').value='';
  document.getElementById('pw-input').focus();
}
var _idleTimer=null;
function startIdleWatch(){
  var m=getIdleMin();
  if(!m)return; // 0 = 不登出
  ['mousemove','keydown','click','touchstart','scroll'].forEach(function(ev){
    document.addEventListener(ev,function(){touchActivity()},{passive:true});
  });
  if(_idleTimer)clearInterval(_idleTimer);
  _idleTimer=setInterval(function(){
    var last=parseInt(localStorage.getItem(ACT_KEY)||'0',10);
    var mm=getIdleMin();if(!mm)return;
    if(Date.now()-last > mm*60*1000){
      clearInterval(_idleTimer);
      lockNow();
    }
  },30000); // 每 30 秒檢查
}
// 初始化：已登入且未超時 → 直接進入
(function(){
  // 同步目前設定值到選單
  try{document.getElementById('idle-sel').value=String(getIdleMin())}catch(e){}
  if(localStorage.getItem('jj_unlocked')==='1'){
    var last=parseInt(localStorage.getItem(ACT_KEY)||'0',10);
    var m=getIdleMin();
    if(!m || Date.now()-last < m*60*1000){
      document.getElementById('lock-screen').style.display='none';
      touchActivity();
      startIdleWatch();
    }else{
      localStorage.removeItem('jj_unlocked');
    }
  }
})();
</script>
<div id="root"></div>
<script>
// 下載功能 — HTML 表格匯出 Excel（穩定可靠）
// mode: 'full' = 完整版, 'vendor' = 廠商版（隱藏淨淨內部欄位）
(function(){
var N=function(n){return n==null||isNaN(n)?'-':Math.round(n).toLocaleString()};
var P=function(n){return n==null||isNaN(n)||!isFinite(n)?'-':(n*100).toFixed(1)+'%'};
var hd='background:#1A6A75;color:#fff;font-weight:bold;padding:8px 12px;border:1px solid #c0d8dc;font-size:12px;text-align:center';
var td0='padding:6px 10px;border:1px solid #e2e8f0;font-size:12px';
var alt='background:#EDF5F7';
var pC=function(v){return v>=0?'color:#059669;font-weight:bold':'color:#dc2626;font-weight:bold'};

function makeEvDetail(ev,isV,skipHeader){
  var rows=ev.rows||[];if(!rows.length)return '';
  var cols=isV?7:12;
  var h='<table style="border-collapse:collapse;width:100%;margin-top:'+(skipHeader?'8':'24')+'px">';
  if(!skipHeader){
    h+='<tr><td colspan="'+cols+'" style="padding:14px 0 6px;border:none"><b style="font-size:14px;color:#1A6A75">'+
      (ev.name||'')+' — 報價明細</b><br><span style="font-size:11px;color:#64748b">'+
      (ev.client||'')+(ev.commission>0?' · 分潤'+(ev.commission*100).toFixed(0)+'%':'')+' ｜ '+(ev.date||'')+'</span></td></tr>';
    // 摘要
    if(isV){
      h+='<tr><td colspan="3" style="border:none;padding:6px"><b>營業額</b> $'+N(ev.totalRevenue)+'</td>';
      h+='<td colspan="2" style="border:none;padding:6px"><b>運費</b> $'+N(ev.shipping||0)+'</td>';
      h+='<td colspan="2" style="border:none;padding:6px"></td></tr>';
    }else{
      h+='<tr><td colspan="3" style="border:none;padding:6px"><b>營業額</b> $'+N(ev.totalRevenue)+'</td>';
      h+='<td colspan="3" style="border:none;padding:6px;'+pC(ev.totalProfit)+'"><b>利潤</b> $'+N(ev.totalProfit)+'</td>';
      h+='<td colspan="2" style="border:none;padding:6px"><b>運費</b> $'+N(ev.shipping||0)+'</td>';
      h+='<td colspan="3" style="border:none;padding:6px"><b>毛利率</b> '+P(ev.totalMargin)+'</td></tr>';
    }
  }
  // 表頭
  h+='<tr>';
  if(isV){
    ['品項','組數','官網價','直播價','進貨價','廠商利潤','廠商毛利'].forEach(function(t){h+='<th style="'+hd+'">'+t+'</th>'});
  }else{
    ['品項','組數','官網價','直播價','進貨價','廠商利潤','廠商毛利','淨淨營業額','單位成本','淨淨成本','淨淨利潤','毛利率'].forEach(function(t){h+='<th style="'+hd+'">'+t+'</th>'});
  }
  h+='</tr>';
  rows.forEach(function(r,i){
    var c=r.calc||{};var bg=i%2===0?alt:'';
    h+='<tr style="'+(bg?bg:'')+'">'+
    '<td style="'+td0+';font-weight:bold">'+(c.name||'')+'</td>'+
    '<td style="'+td0+';text-align:center">'+r.qty+'</td>'+
    '<td style="'+td0+';text-align:right">$'+N(c.retail)+'</td>'+
    '<td style="'+td0+';text-align:right">$'+N(c.lp)+'</td>'+
    '<td style="'+td0+';text-align:right;font-weight:bold">$'+N(c.cp)+'</td>'+
    '<td style="'+td0+';text-align:right;'+pC(c.vendorProfit)+'">$'+N(c.vendorProfit)+'</td>'+
    '<td style="'+td0+';text-align:center">'+P(c.vendorMargin)+'</td>';
    if(!isV){
      var _uc=c.unitCost||(r.qty?(c.totalCost||0)/r.qty:0);
      h+='<td style="'+td0+';text-align:right">$'+N(c.netRevenue)+'</td>'+
      '<td style="'+td0+';text-align:right">$'+N(_uc)+'</td>'+
      '<td style="'+td0+';text-align:right">$'+N(c.totalCost)+'</td>'+
      '<td style="'+td0+';text-align:right;'+pC(c.netProfit)+'">$'+N(c.netProfit)+'</td>'+
      '<td style="'+td0+';text-align:center">'+P(c.netMargin)+'</td>';
    }
    h+='</tr>';
  });
  h+='</table>';return h;
}

window._dlXlsx=function(evList,fileName,mode){
  mode=mode||'full';
  var isV=(mode==='vendor');
  var totR=0,totP=0,totS=0,totC=0;
  evList.forEach(function(e){totR+=(e.totalRevenue||0);totP+=(e.totalProfit||0);totS+=(e.shipping||0);totC+=(e.totalCost||0)});

  var html='<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40">'+
  '<head><meta charset="utf-8">'+
  '<style>td,th{mso-number-format:"\\@"}body{font-family:"微軟正黑體",Arial,sans-serif;font-size:12px}</style>'+
  '</head><body>'+
  '<div style="padding:16px 0 8px">'+
  '<span style="font-size:20px;font-weight:bold;color:#1A6A75">淨淨 Clean Clean</span>'+
  '<span style="font-size:18px;color:#1A6A75;margin-left:10px">'+(isV?'報價明細':'報價總表')+'</span></div>'+
  '<div style="font-size:12px;color:#64748b;margin-bottom:12px">匯出日期：'+new Date().toLocaleDateString('zh-TW')+' ｜ 共 '+evList.length+' 場'+(isV?' ｜ 廠商版':'')+'</div>';

  var isSingle=(evList.length===1);

  if(!isSingle){
    // 摘要卡片
    html+='<table style="margin-bottom:16px"><tr>';
    html+='<td style="padding:8px 20px;background:#f0f7f8"><div style="font-size:10px;color:#64748b">累計營業額</div><div style="font-size:18px;font-weight:bold;color:#1A6A75">$'+N(totR)+'</div></td>';
    if(!isV){
      html+='<td style="padding:8px 20px;background:#f0fdf4"><div style="font-size:10px;color:#64748b">累計利潤</div><div style="font-size:18px;font-weight:bold;'+pC(totP)+'">$'+N(totP)+'</div></td>';
    }
    html+='<td style="padding:8px 20px;background:#fffbeb"><div style="font-size:10px;color:#64748b">累計運費</div><div style="font-size:18px;font-weight:bold">$'+N(totS)+'</div></td>';
    if(!isV){
      html+='<td style="padding:8px 20px;background:#fef2f2"><div style="font-size:10px;color:#64748b">平均毛利率</div><div style="font-size:18px;font-weight:bold">'+P(totR>0?totP/totR:0)+'</div></td>';
    }
    html+='</tr></table>';

    // 場次總表
    html+='<table style="border-collapse:collapse;width:100%"><tr>';
    if(isV){
      ['場次名稱','廠商','日期','營業額','運費'].forEach(function(t){html+='<th style="'+hd+'">'+t+'</th>'});
    }else{
      ['場次名稱','廠商','日期','分潤','營業額','總成本','運費','利潤','毛利率'].forEach(function(t){html+='<th style="'+hd+'">'+t+'</th>'});
    }
    html+='</tr>';
    evList.forEach(function(e,i){
      var bg=i%2===0?alt:'';
      html+='<tr style="'+(bg?bg:'')+'">'+
      '<td style="'+td0+';font-weight:bold">'+(e.name||'')+'</td>'+
      '<td style="'+td0+'">'+(e.client||'')+'</td>'+
      '<td style="'+td0+'">'+(e.date||'')+'</td>';
      if(!isV){
        html+='<td style="'+td0+';text-align:center">'+(e.commission>0?(e.commission*100).toFixed(0)+'%':'—')+'</td>';
      }
      html+='<td style="'+td0+';text-align:right">$'+N(e.totalRevenue)+'</td>';
      if(!isV){
        html+='<td style="'+td0+';text-align:right">$'+N(e.totalCost)+'</td>';
      }
      html+='<td style="'+td0+';text-align:right">$'+N(e.shipping||0)+'</td>';
      if(!isV){
        html+='<td style="'+td0+';text-align:right;'+pC(e.totalProfit)+'">$'+N(e.totalProfit)+'</td>'+
        '<td style="'+td0+';text-align:center">'+P(e.totalMargin)+'</td>';
      }
      html+='</tr>';
    });
    html+='</table>';
  }else{
    // 單場：先顯示 日期/廠商/營業額 等欄位資訊，再顯示明細
    var ev=evList[0];
    html+='<table style="margin-bottom:8px;border-collapse:collapse"><tr>'+
      '<td style="padding:6px 14px;background:#f0f7f8;border:1px solid #e2e8f0"><div style="font-size:10px;color:#64748b">日期</div><div style="font-size:14px;font-weight:bold">'+(ev.date||'-')+'</div></td>'+
      '<td style="padding:6px 14px;background:#f0f7f8;border:1px solid #e2e8f0"><div style="font-size:10px;color:#64748b">廠商</div><div style="font-size:14px;font-weight:bold">'+(ev.client||'-')+'</div></td>'+
      '<td style="padding:6px 14px;background:#f0f7f8;border:1px solid #e2e8f0"><div style="font-size:10px;color:#64748b">場次名稱</div><div style="font-size:14px;font-weight:bold">'+(ev.name||'-')+'</div></td>'+
      '<td style="padding:6px 14px;background:#f0f7f8;border:1px solid #e2e8f0"><div style="font-size:10px;color:#64748b">營業額</div><div style="font-size:14px;font-weight:bold;color:#1A6A75">$'+N(ev.totalRevenue)+'</div></td>'+
      '<td style="padding:6px 14px;background:#fffbeb;border:1px solid #e2e8f0"><div style="font-size:10px;color:#64748b">運費</div><div style="font-size:14px;font-weight:bold">$'+N(ev.shipping||0)+'</div></td>';
    if(!isV){
      html+='<td style="padding:6px 14px;background:#f0fdf4;border:1px solid #e2e8f0"><div style="font-size:10px;color:#64748b">分潤</div><div style="font-size:14px;font-weight:bold">'+(ev.commission>0?(ev.commission*100).toFixed(0)+'%':'—')+'</div></td>'+
      '<td style="padding:6px 14px;background:#f0fdf4;border:1px solid #e2e8f0"><div style="font-size:10px;color:#64748b">總成本</div><div style="font-size:14px;font-weight:bold">$'+N(ev.totalCost)+'</div></td>'+
      '<td style="padding:6px 14px;background:#fef2f2;border:1px solid #e2e8f0"><div style="font-size:10px;color:#64748b">利潤</div><div style="font-size:14px;font-weight:bold;'+pC(ev.totalProfit)+'">$'+N(ev.totalProfit)+'</div></td>'+
      '<td style="padding:6px 14px;background:#fef2f2;border:1px solid #e2e8f0"><div style="font-size:10px;color:#64748b">毛利率</div><div style="font-size:14px;font-weight:bold">'+P(ev.totalMargin)+'</div></td>';
    }
    html+='</tr></table>';
  }

  // 每場明細
  evList.forEach(function(ev){html+=makeEvDetail(ev,isV,isSingle)});

  html+='<div style="margin-top:24px;padding-top:10px;border-top:1px solid #e2e8f0;font-size:10px;color:#94a3b8;text-align:center">淨淨 Clean Clean 報價管理系統 · 自動產生</div>';
  html+='</body></html>';

  var blob=new Blob(['\ufeff'+html],{type:'application/vnd.ms-excel;charset=utf-8'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=fileName+'.xls';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
};
})();
</script>
<script type="text/babel">
const{useState,useMemo,useEffect,useRef}=React;
const $=n=>n==null||isNaN(n)?'-':Math.round(n).toLocaleString();
const P=n=>n==null||isNaN(n)||!isFinite(n)?'-':(n*100).toFixed(1)+'%';
const C=r=>!isFinite(r)||isNaN(r)?'':r>=.35?'ph':r>=.2?'pm':'pl';

/* ===== 資料持久化（外部檔案 + localStorage 雙備份）===== */
const SK='jj_quote_data_v3';
// 比較 savedAt，data.js 較新就用 data.js（並同步更新 localStorage）
const _useFile=(function(){
  try{
    const s=localStorage.getItem(SK);
    const lsTime=s?JSON.parse(s).savedAt||'':'';

async function fetchCloudData(){
  try{

// 智慧合併：events/clients 用 ID 去重合併（雙方都保留），products/combos 以本機為準
function mergeData(local,cloud){
  if(!cloud)return local;
  const mergeById=(a=[],b=[])=>{
    const map=new Map();
    [...b,...a].forEach(x=>{if(x&&x.id!=null)map.set(x.id,x)});
    return Array.from(map.values());
  };
  return{
    p:local.p,  // 產品以本機為主
    c:local.c,  // 組合以本機為主
    cl:mergeById(local.cl,cloud.cl),  // 客戶合併（雙方都保留）
    ev:mergeById(local.ev,cloud.ev),  // 場次合併（雙方都保留）
    savedAt:local.savedAt
  };
}
async function saveToGitHub(content){
  let token=getGHToken();
  if(!token){
    token=prompt('首次使用 GitHub 自動部署，請輸入 GitHub Personal Access Token：\n\n（到 GitHub → Settings → Developer settings →\nFine-grained tokens 建立，\n只需給 cleanclean-hub repo 的 Contents 讀寫權限）');
    if(!token)throw new Error('未輸入 Token，取消部署');
    setGHToken(token);
  }
  const api='https://api.github.com';
  const path='data.js';
  const headers={'Authorization':'token '+token,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json','User-Agent':'cleanclean-hub-deploy'};
  let sha=null;
  try{
    const r=await fetch(api+'/repos/'+_GH.user+'/'+_GH.repo+'/contents/'+path+'?ref='+_GH.branch,{headers});
    if(r.ok){const j=await r.json();sha=j.sha;}
  }catch(e){}
  const b64=btoa(unescape(encodeURIComponent(content)));
  const body={message:'更新報價資料 '+new Date().toLocaleString('zh-TW'),content:b64,branch:_GH.branch};
  if(sha)body.sha=sha;
  const r2=await fetch(api+'/repos/'+_GH.user+'/'+_GH.repo+'/contents/'+path,{method:'PUT',headers,body:JSON.stringify(body)});
  if(!r2.ok){
    if(r2.status===401||r2.status===403){localStorage.removeItem('jj_gh_token');throw new Error('Token 無效或過期，請重新儲存時輸入新的 Token');}
    const t=await r2.text();throw new Error('GitHub API 錯誤 '+r2.status+': '+t);
  }
  return true;
}

/* 儲存資料到外部檔案（data.js）- 支援直接覆蓋寫入 + GitHub 自動部署，需管理員權限 */
const saveToFile=async()=>{

  const isLocal=location.protocol==='file:';

    try{

      _fileHandle=fh;
    }catch(e){
      if(e.name!=='AbortError')console.warn('File System Access API 失敗',e);
      // 即使取消檔案選擇，也繼續走 GitHub 儲存流程
    }
  }
  // 驗證管理員密碼（一定會執行）
  if(!await checkAdmin())return;

  const cloud=await fetchCloudData();

  const merged=mergeData(local,cloud);

  const addedCl=(merged.cl.length||0)-(clients.length||0);
  if(addedEv>0||addedCl>0){

    // 同步合併結果到當前 state（這樣 UI 會立即更新）
    if(addedEv>0)sE(merged.ev);
    if(addedCl>0)sCl(merged.cl);
  }
  const data={p:merged.p,c:merged.c,cl:merged.cl,ev:merged.ev,savedAt:new Date().toISOString()};
  const content='// 淨淨報價系統 - 資料儲存檔\n// 此檔案由系統自動產生，請勿手動修改\n// 最後更新：'+new Date().toLocaleString('zh-TW')+'\nwindow.JJ_DATA = '+JSON.stringify(data,null,2)+';\n';
  let localOk=false;

  if(_fileHandle){
    try{
      const w=await _fileHandle.createWritable();
      await w.write(content);
      await w.close();
      localOk=true;

      console.warn('本機寫入失敗',e);
      _fileHandle=null;
    }

    await saveToGitHub(content);

const backupZip=async()=>{
  if(typeof JSZip==='undefined'){alert('JSZip 尚未載入，請檢查網路');return;}
  const zip=new JSZip();
  const data={p:products,c:combos,cl:clients,ev:events,savedAt:new Date().toISOString()};
  const dataContent='// 淨淨報價系統 - 資料儲存檔\n// 備份時間：'+new Date().toLocaleString('zh-TW')+'\nwindow.JJ_DATA = '+JSON.stringify(data,null,2)+';\n';
  zip.file('data.js',dataContent);
  // 若有 master.js 也一起打包
  try{
    const r=await fetch('./master.js');
    if(r.ok){zip.file('master.js',await r.text());}
  }catch(e){}
  zip.file('README.txt','淨淨經營管理系統 備份檔\n備份時間：'+new Date().toLocaleString('zh-TW')+'\n\n還原方式：\n1. 把 data.js 和 master.js 放回報價單資料夾\n2. 或在系統中點「從 ZIP 還原」選此檔\n');
  const blob=await zip.generateAsync({type:'blob'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='淨淨備份_'+new Date().toISOString().slice(0,10)+'.zip';a.click();
  URL.revokeObjectURL(a.href);
};
/* 從 ZIP 還原 */
const restoreZip=async()=>{
  if(!await checkAdmin())return;
  if(typeof JSZip==='undefined'){alert('JSZip 尚未載入');return;}
  const input=document.createElement('input');input.type='file';input.accept='.zip';
  input.onchange=async e=>{
    const f=e.target.files[0];if(!f)return;
    try{
      const zip=await JSZip.loadAsync(f);
      const dataFile=zip.file('data.js');
      if(!dataFile){alert('ZIP 中找不到 data.js');return;}
      const txt=await dataFile.async('string');
      const m=txt.match(/window\.JJ_DATA\s*=\s*(\{[\s\S]*\});/);
      if(!m){alert('data.js 格式錯誤');return;}
      const d=JSON.parse(m[1]);
      if(!confirm(`將還原：\n場次 ${(d.ev||[]).length} 筆\n客戶 ${(d.cl||[]).length} 筆\n產品 ${(d.p||[]).length} 筆\n\n本機資料會被取代，繼續嗎？`))return;
      if(d.p)sP(d.p);if(d.c)sC(d.c);if(d.cl)sCl(d.cl);if(d.ev)sE(d.ev);
      alert('✅ 還原完成！請按「儲存資料」推送到雲端。');
    }catch(err){alert('還原失敗：'+err.message)}
  };
  input.click();
};
/* 匯出 JSON 備份 */
const exportData=()=>{
  const data={p:products,c:combos,cl:clients,ev:events,exportDate:new Date().toISOString()};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='淨淨報價資料_備份_'+new Date().toISOString().slice(0,10)+'.json';a.click();
};
const importData=async()=>{
  if(!await checkAdmin())return;
  const input=document.createElement('input');input.type='file';input.accept='.json,.js';
  input.onchange=e=>{const f=e.target.files[0];if(!f)return;
    const reader=new FileReader();reader.onload=ev=>{
      try{
        let d;
        const txt=ev.target.result;
        if(txt.includes('window.JJ_DATA')){
          // 從 .js 檔案解析
          const match=txt.match(/window\.JJ_DATA\s*=\s*(\{[\s\S]*\});/);
          if(match)d=JSON.parse(match[1]);
        }else{d=JSON.parse(txt)}
        if(!d)throw new Error('格式錯誤');
        if(d.p&&d.p.length)sP(d.p);if(d.c&&d.c.length)sC(d.c);if(d.cl&&d.cl.length)sCl(d.cl);if(d.ev)sE(d.ev);
        setSaved(true);_unsaved=false;
        alert('資料匯入成功！共 '+(d.ev||[]).length+' 筆場次、'+(d.cl||[]).length+' 個客戶');
      }catch(err){alert('匯入失敗：檔案格式錯誤')}
    };reader.readAsText(f)};
  input.click();
};

/* ==================== 新：載入主檔 ==================== */
const M = window.JJ_MASTER || {products:[],clients:[],salesByClient:{},salesByProduct:{},salesByMonth:{},salesBySales:{},salesByCat:{},recentSales:[],totalTxns:0};
/* 物料產品名稱（全系統一律不顯示） */
const MATERIAL_NAMES = new Set((M.products||[]).filter(p=>p.cat1==='淨淨物料').map(p=>p.name));
const isMaterial = n => MATERIAL_NAMES.has(n);

/* 從 salesByMonth 取得所有有資料的年份（降冪），並預設最新一年 */
const ALL_YEARS = [...new Set(Object.keys(M.salesByMonth||{}).map(ym=>ym.slice(0,4)))].sort().reverse();
const DEFAULT_YEAR = ALL_YEARS[0] || new Date().getFullYear().toString();
const MONTHS = ['01','02','03','04','05','06','07','08','09','10','11','12'];

/* ===== 共用：Chart.js wrapper ===== */
function Chart2({type,data,options,height}){
  const ref=useRef(null);const instRef=useRef(null);
  useEffect(()=>{
    if(!ref.current||typeof Chart==='undefined')return;
    if(instRef.current)instRef.current.destroy();
    instRef.current=new Chart(ref.current,{type,data,options:{responsive:true,maintainAspectRatio:false,...options}});
    return()=>{if(instRef.current)instRef.current.destroy()};
  },[JSON.stringify(data),JSON.stringify(options),type]);
  return <div style={{position:'relative',height:height||260}}><canvas ref={ref}/></div>;
}

/* 依年份篩選客戶月銷售 */
function filterClientMonths(mo,year,month){
  if(!mo)return {};
  return Object.fromEntries(Object.entries(mo).filter(([ym])=>{
    if(year!=='all'&&!ym.startsWith(year))return false;
    if(month!=='all'&&ym.slice(5,7)!==month)return false;
    return true;
  }));
}
function sumMonths(mo){
  let r=0,p=0,q=0;
  Object.values(mo).forEach(v=>{r+=v[0]||0;p+=v[1]||0;q+=v[2]||0});
  return{r,p,q,mg:r>0?p/r*100:0};
}

/* Top 10 熱賣產品（可切換累計 / 當前篩選） */
function TopProducts({cli,yearF,monthF}){
  const[mode,setMode]=useState('all'); // all=累計, period=依篩選
  const data = useMemo(()=>{
    if(mode==='all')return cli._s.tp.filter(p=>!isMaterial(p[0])).map(p=>({name:p[0],r:p[1],pr:p[2],q:p[3]})).slice(0,10);
    // 依當前年月篩選 → 從 recentSales 重算（僅涵蓋近 180 天）
    const rs = M.recentSales||[];
    const agg = {};
    rs.forEach(s=>{
      if(s.cc!==cli.code)return;
      if(isMaterial(s.pn))return;
      const y=s.d.slice(0,4),m=s.d.slice(5,7);
      if(yearF!=='all'&&y!==yearF)return;
      if(monthF!=='all'&&m!==String(monthF).padStart(2,'0'))return;
      if(!agg[s.pn])agg[s.pn]={name:s.pn,r:0,pr:0,q:0};
      agg[s.pn].r+=s.r;agg[s.pn].pr+=s.pr;agg[s.pn].q+=s.q;
    });
    return Object.values(agg).sort((a,b)=>b.r-a.r).slice(0,10);
  },[cli,mode,yearF,monthF]);
  const modeLabel = mode==='all'?'累計':`${yearF==='all'?'全部':yearF+'年'}${monthF==='all'?'':' '+monthF+'月'}`;
  return(<div className="card" style={{padding:16,marginBottom:16}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
      <h3 style={{fontSize:14,fontWeight:600}}>🏆 Top 10 熱賣產品（{modeLabel}）</h3>
      <div style={{display:'flex',gap:4,background:'#f1f5f9',borderRadius:8,padding:2}}>
        <button onClick={()=>setMode('all')} style={{padding:'4px 12px',border:'none',borderRadius:6,fontSize:12,cursor:'pointer',background:mode==='all'?'#1A6A75':'transparent',color:mode==='all'?'#fff':'#64748b',fontWeight:mode==='all'?600:400}}>累計</button>
        <button onClick={()=>setMode('period')} style={{padding:'4px 12px',border:'none',borderRadius:6,fontSize:12,cursor:'pointer',background:mode==='period'?'#1A6A75':'transparent',color:mode==='period'?'#fff':'#64748b',fontWeight:mode==='period'?600:400}}>依年月</button>
      </div>
    </div>
    {mode==='period'&&data.length===0&&<div style={{padding:20,textAlign:'center',color:'#94a3b8',fontSize:12}}>此期間無交易明細<br/><span style={{fontSize:11}}>（依年月查詢僅涵蓋最近 180 天明細）</span></div>}
    {data.length>0&&<div style={{maxWidth:780}}><table style={{fontSize:12,width:'100%',tableLayout:'fixed'}}><colgroup><col style={{width:'40%'}}/><col style={{width:'18%'}}/><col style={{width:'21%'}}/><col style={{width:'21%'}}/></colgroup><thead><tr><th style={{padding:'6px 10px'}}>產品</th><th style={{textAlign:'right',padding:'6px 10px'}}>數量</th><th style={{textAlign:'right',padding:'6px 10px'}}>營業額</th><th style={{textAlign:'right',padding:'6px 10px'}}>毛利</th></tr></thead>

/* ==================== 💳 應收帳款總覽 ==================== */
function ARPage(){
  const details = M.receivableDetails||[];
  const missing = M.missingInvoices||[];
  const clients = M.clients||[];
  const[sort,setSort]=useState('amt'); // amt / days
  const[filter,setFilter]=useState('all'); // all / overdue / b90p
  const[q,setQ]=useState('');
  const[yearF,setYearF]=useState('all');
  const[monthF,setMonthF]=useState('all');
  const[expanded,setExpanded]=useState(null); // cc
  const[showMissing,setShowMissing]=useState(false);

  const clientNameMap = {};
  clients.forEach(c=>clientNameMap[c.code]=c);

  // 所有可選年份（從未收 + 未開發票 明細擷取）
  const allYears = useMemo(()=>{
    const s = new Set();
    details.forEach(d=>{if(d.d)s.add(d.d.slice(0,4))});
    missing.forEach(d=>{if(d.d)s.add(d.d.slice(0,4))});
    return [...s].sort().reverse();
  },[]);

  const yearMatch = d => yearF==='all' || (d && d.startsWith(yearF));
  const monthMatch = d => monthF==='all' || (d && d.slice(5,7)===monthF);

  // 依年月篩選明細，再重新按客戶彙總
  const filteredDetails = details.filter(d=>yearMatch(d.d)&&monthMatch(d.d));
  const byClient = useMemo(()=>{
    const agg = {};
    filteredDetails.forEach(d=>{
      const k = d.cc;
      if(!agg[k]) agg[k] = {cc:k,cnt:0,amt:0,b30:0,b60:0,b90:0,b90p:0,oldest:'',maxDays:0};
      agg[k].cnt += 1;
      agg[k].amt += d.unpaid;
      const b = d.days<=30?'b30':d.days<=60?'b60':d.days<=90?'b90':'b90p';
      agg[k][b] += d.unpaid;
      if(!agg[k].oldest || d.d<agg[k].oldest) agg[k].oldest = d.d;
      if(d.days>agg[k].maxDays) agg[k].maxDays = d.days;
    });
    return agg;
  },[yearF,monthF]);

  let rows = Object.values(byClient).map(v=>{
    const c = clientNameMap[v.cc]||{name:'',sales:''};
    return {...v,name:c.name,sales:c.sales};
  });
  if(filter==='overdue') rows = rows.filter(r=>r.b90>0||r.b90p>0);
  if(filter==='b90p') rows = rows.filter(r=>r.b90p>0);
  if(q) rows = rows.filter(r=>r.name.includes(q)||r.cc.includes(q)||r.sales.includes(q));
  rows.sort((a,b)=> sort==='amt'? b.amt-a.amt : b.maxDays-a.maxDays);

  const totalAmt = rows.reduce((a,r)=>a+r.amt,0);
  const totalB90 = rows.reduce((a,r)=>a+(r.b90||0)+(r.b90p||0),0);
  const totalB90p = rows.reduce((a,r)=>a+(r.b90p||0),0);

  // 未開發票：依篩選 + 依客戶分組
  const filteredMissing = missing.filter(d=>yearMatch(d.d)&&monthMatch(d.d));
  const missingByClient = useMemo(()=>{
    const agg = {};
    filteredMissing.forEach(d=>{
      if(!agg[d.cc]) agg[d.cc] = {cc:d.cc,cn:d.cn,cnt:0,amt:0,unpaid:0,cleared:0,rows:[]};
      agg[d.cc].cnt += 1;
      agg[d.cc].amt += d.amt;
      agg[d.cc].unpaid += d.unpaid;
      if(d.cleared==='Y') agg[d.cc].cleared += 1;
      agg[d.cc].rows.push(d);
    });
    return Object.values(agg).sort((a,b)=>b.amt-a.amt);
  },[yearF,monthF]);
  const mTotalAmt = filteredMissing.reduce((a,d)=>a+d.amt,0);
  const mTotalUnpaid = filteredMissing.reduce((a,d)=>a+d.unpaid,0);

  return(<div>
    <h2 style={{fontSize:18,fontWeight:600,marginBottom:16}}>💳 應收帳款</h2>

    {/* KPI 卡 */}
    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(200px,1fr))',gap:12,marginBottom:16}}>
      <div className="sc s1"><div style={{fontSize:12,opacity:.9}}>未收總額</div><div style={{fontSize:22,fontWeight:700}}>${Math.round(totalAmt).toLocaleString()}</div><div style={{fontSize:11,opacity:.85,marginTop:4}}>{rows.length} 家客戶</div></div>
      <div className="sc" style={{background:'linear-gradient(135deg,#b45309,#f59e0b)'}}><div style={{fontSize:12,opacity:.9}}>逾 60 天以上</div><div style={{fontSize:22,fontWeight:700}}>${Math.round(totalB90).toLocaleString()}</div><div style={{fontSize:11,opacity:.85,marginTop:4}}>占 {totalAmt>0?(totalB90/totalAmt*100).toFixed(1):0}%</div></div>
      <div className="sc" style={{background:'linear-gradient(135deg,#991b1b,#dc2626)'}}><div style={{fontSize:12,opacity:.9}}>逾 90 天以上</div><div style={{fontSize:22,fontWeight:700}}>${Math.round(totalB90p).toLocaleString()}</div><div style={{fontSize:11,opacity:.85,marginTop:4}}>占 {totalAmt>0?(totalB90p/totalAmt*100).toFixed(1):0}%</div></div>
      <div className="sc" style={{background:'linear-gradient(135deg,#7c3aed,#a78bfa)',cursor:filteredMissing.length?'pointer':'default'}} onClick={()=>filteredMissing.length&&setShowMissing(!showMissing)}>
        <div style={{fontSize:12,opacity:.9}}>🧾 未開發票</div>
        <div style={{fontSize:22,fontWeight:700}}>${Math.round(mTotalAmt).toLocaleString()}</div>
        <div style={{fontSize:11,opacity:.85,marginTop:4}}>{filteredMissing.length} 筆 ｜ {missingByClient.length} 家客戶 {filteredMissing.length>0&&<span style={{marginLeft:4}}>{showMissing?'▼':'▶'}</span>}</div>
      </div>
    </div>

    {/* 年月 + 篩選 + 搜尋 */}
    <div className="card sticky-bar" style={{padding:12,marginBottom:16,position:'sticky',top:56,zIndex:20,background:'#fff',boxShadow:'0 2px 8px rgba(0,0,0,.04)'}}>
      <div style={{display:'flex',gap:8,alignItems:'flex-end',flexWrap:'wrap'}}>
        <F l="年度"><select value={yearF} onChange={e=>setYearF(e.target.value)} style={{minWidth:90}}>
          <option value="all">全部</option>
          {allYears.map(y=><option key={y} value={y}>{y}</option>)}
        </select></F>
        <F l="月份"><select value={monthF} onChange={e=>setMonthF(e.target.value)} style={{minWidth:80}}>
          <option value="all">全部</option>
          {MONTHS.map(m=><option key={m} value={m}>{m}</option>)}
        </select></F>
        <F l="篩選"><select value={filter} onChange={e=>setFilter(e.target.value)}>
          <option value="all">全部未收</option>
          <option value="overdue">逾 60 天以上</option>
          <option value="b90p">逾 90 天以上</option>
        </select></F>
        <F l="排序"><select value={sort} onChange={e=>setSort(e.target.value)}>
          <option value="amt">未收金額大→小</option>
          <option value="days">帳齡久→新</option>
        </select></F>
        <F l="搜尋"><input type="text" value={q} onChange={e=>setQ(e.target.value)} placeholder="客戶名稱/代號/業務" style={{width:220}}/></F>
      </div>
    </div>

    {/* 未開發票通知區（展開後顯示） */}
    {showMissing&&filteredMissing.length>0&&<div className="card" style={{padding:16,marginBottom:16,border:'2px solid #7c3aed',background:'#faf5ff'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
        <h3 style={{fontSize:14,fontWeight:600,color:'#6d28d9'}}>🧾 未開立發票清單</h3>
        <div style={{fontSize:12,color:'#64748b'}}>合計 {filteredMissing.length} 筆 ｜ 金額 ${Math.round(mTotalAmt).toLocaleString()} ｜ 未收 ${Math.round(mTotalUnpaid).toLocaleString()}</div>
      </div>
      <div style={{maxHeight:320,overflow:'auto',background:'#fff',borderRadius:6,border:'1px solid #e9d5ff'}}>
        <table style={{fontSize:12,width:'100%'}}>
          <thead style={{background:'#f3e8ff',position:'sticky',top:0}}><tr>
            <th style={{padding:'6px 10px',textAlign:'left'}}>客戶</th>
            <th style={{padding:'6px 10px',textAlign:'right'}}>筆數</th>
            <th style={{padding:'6px 10px',textAlign:'right'}}>金額</th>
            <th style={{padding:'6px 10px',textAlign:'right'}}>未收</th>
            <th style={{padding:'6px 10px',textAlign:'right'}}>已收/已結清</th>
          </tr></thead>
          <tbody>{missingByClient.map((c,i)=>{const exp=expanded==='mi_'+c.cc;return(<React.Fragment key={c.cc}>
            <tr onClick={()=>setExpanded(exp?null:'mi_'+c.cc)} style={{cursor:'pointer',borderTop:'1px solid #f1f5f9'}}>
              <td style={{padding:'6px 10px'}}>{exp?'▼':'▶'} {c.cn} <span style={{color:'#94a3b8',fontSize:11}}>({c.cc})</span></td>
              <td style={{padding:'6px 10px',textAlign:'right'}}>{c.cnt}</td>
              <td style={{padding:'6px 10px',textAlign:'right',fontWeight:600}}>${Math.round(c.amt).toLocaleString()}</td>
              <td style={{padding:'6px 10px',textAlign:'right',color:c.unpaid>0?'#dc2626':'#64748b'}}>${Math.round(c.unpaid).toLocaleString()}</td>
              <td style={{padding:'6px 10px',textAlign:'right',color:'#64748b'}}>{c.cleared} / {c.cnt}</td>
            </tr>
            {exp&&<tr><td colSpan="5" style={{padding:0,background:'#faf5ff'}}>
              <table style={{fontSize:11,width:'100%'}}>
                <thead><tr>
                  <th style={{padding:'4px 10px',textAlign:'left'}}>日期</th>
                  <th style={{padding:'4px 10px',textAlign:'left'}}>單號</th>
                  <th style={{padding:'4px 10px',textAlign:'right'}}>金額</th>
                  <th style={{padding:'4px 10px',textAlign:'right'}}>已收</th>
                  <th style={{padding:'4px 10px',textAlign:'right'}}>未收</th>
                  <th style={{padding:'4px 10px',textAlign:'center'}}>狀態</th>
                </tr></thead>
                <tbody>{c.rows.sort((a,b)=>b.d.localeCompare(a.d)).map((d,j)=><tr key={j}>
                  <td style={{padding:'3px 10px'}}>{d.d}</td>
                  <td style={{padding:'3px 10px',color:'#64748b'}}>{d.dn}</td>
                  <td style={{padding:'3px 10px',textAlign:'right'}}>${d.amt.toLocaleString()}</td>
                  <td style={{padding:'3px 10px',textAlign:'right',color:'#64748b'}}>${d.paid.toLocaleString()}</td>
                  <td style={{padding:'3px 10px',textAlign:'right',color:d.unpaid>0?'#dc2626':'#64748b',fontWeight:d.unpaid>0?600:400}}>${d.unpaid.toLocaleString()}</td>
                  <td style={{padding:'3px 10px',textAlign:'center'}}>{d.cleared==='Y'?<span style={{color:'#059669',fontSize:10}}>✓ 已結清</span>:<span style={{color:'#dc2626',fontSize:10}}>未結清</span>}</td>
                </tr>)}</tbody>
              </table>
            </td></tr>}
          </React.Fragment>)})}</tbody>
        </table>
      </div>
    </div>}

    {/* 未收帳款表 */}
    <div className="card" style={{padding:0,overflow:'hidden'}}>
      <table style={{fontSize:12,width:'100%'}}>
        <thead style={{background:'#f8fafc'}}><tr>
          <th style={{padding:'8px 10px',textAlign:'left'}}>客戶</th>
          <th style={{padding:'8px 10px',textAlign:'left'}}>業務</th>
          <th style={{padding:'8px 10px',textAlign:'right'}}>筆數</th>
          <th style={{padding:'8px 10px',textAlign:'right'}}>未收總額</th>
          <th style={{padding:'8px 10px',textAlign:'right'}}>0–30</th>
          <th style={{padding:'8px 10px',textAlign:'right'}}>31–60</th>
          <th style={{padding:'8px 10px',textAlign:'right'}}>61–90</th>
          <th style={{padding:'8px 10px',textAlign:'right'}}>90+</th>
          <th style={{padding:'8px 10px',textAlign:'right'}}>最早日期</th>
        </tr></thead>
        <tbody>{rows.map((r,i)=>{const open=expanded===r.cc;const det=open?filteredDetails.filter(d=>d.cc===r.cc).sort((a,b)=>b.days-a.days):[];return(<React.Fragment key={r.cc}>
          <tr onClick={()=>setExpanded(open?null:r.cc)} style={{cursor:'pointer',background:i%2?'#fafafa':'#fff',borderTop:'1px solid #f1f5f9'}}>
            <td style={{padding:'7px 10px',fontWeight:500}}>{open?'▼':'▶'} {r.name} <span style={{color:'#94a3b8',fontSize:11}}>({r.cc})</span></td>
            <td style={{padding:'7px 10px',color:'#64748b'}}>{r.sales}</td>
            <td style={{padding:'7px 10px',textAlign:'right'}}>{r.cnt}</td>
            <td style={{padding:'7px 10px',textAlign:'right',fontWeight:600,color:r.b90p>0?'#dc2626':r.b90>0?'#b45309':'#0f172a'}}>${Math.round(r.amt).toLocaleString()}</td>
            <td style={{padding:'7px 10px',textAlign:'right'}}>${Math.round(r.b30||0).toLocaleString()}</td>
            <td style={{padding:'7px 10px',textAlign:'right',color:(r.b60||0)>0?'#f59e0b':'#94a3b8'}}>${Math.round(r.b60||0).toLocaleString()}</td>
            <td style={{padding:'7px 10px',textAlign:'right',color:(r.b90||0)>0?'#dc2626':'#94a3b8'}}>${Math.round(r.b90||0).toLocaleString()}</td>
            <td style={{padding:'7px 10px',textAlign:'right',color:(r.b90p||0)>0?'#dc2626':'#94a3b8',fontWeight:(r.b90p||0)>0?600:400}}>${Math.round(r.b90p||0).toLocaleString()}</td>
            <td style={{padding:'7px 10px',textAlign:'right',color:'#64748b'}}>{r.oldest}</td>
          </tr>
          {open&&<tr><td colSpan="9" style={{padding:0,background:'#f8fafc'}}>
            <table style={{fontSize:11,width:'100%'}}>
              <thead><tr>
                <th style={{padding:'5px 10px',textAlign:'left'}}>日期</th>
                <th style={{padding:'5px 10px',textAlign:'left'}}>單號</th>
                <th style={{padding:'5px 10px',textAlign:'left'}}>發票</th>
                <th style={{padding:'5px 10px',textAlign:'right'}}>應收</th>
                <th style={{padding:'5px 10px',textAlign:'right'}}>已收</th>
                <th style={{padding:'5px 10px',textAlign:'right'}}>未收</th>
                <th style={{padding:'5px 10px',textAlign:'right'}}>帳齡</th>
              </tr></thead>
              <tbody>{det.map((d,j)=><tr key={j}>
                <td style={{padding:'4px 10px'}}>{d.d}</td>
                <td style={{padding:'4px 10px',color:'#64748b'}}>{d.dn}</td>
                <td style={{padding:'4px 10px',color:d.inv?'#64748b':'#dc2626',fontWeight:d.inv?400:600}}>{d.inv||'(未開)'}</td>
                <td style={{padding:'4px 10px',textAlign:'right'}}>${d.amt.toLocaleString()}</td>
                <td style={{padding:'4px 10px',textAlign:'right',color:'#64748b'}}>${d.paid.toLocaleString()}</td>
                <td style={{padding:'4px 10px',textAlign:'right',fontWeight:600,color:'#dc2626'}}>${d.unpaid.toLocaleString()}</td>
                <td style={{padding:'4px 10px',textAlign:'right',color:d.days>90?'#dc2626':d.days>60?'#f59e0b':'#64748b'}}>{d.days} 天</td>
              </tr>)}</tbody>
            </table>
          </td></tr>}
        </React.Fragment>)})}</tbody>
      </table>
      {rows.length===0&&<div style={{padding:40,textAlign:'center',color:'#94a3b8'}}>🎉 此期間無未收帳款</div>}
    </div>
  </div>);
}

/* ==================== 🌟 客戶儀表板 ==================== */
function CustomerDashboard(){
  const allClients = M.clients||[];
  const[q,setQ]=useState('');
  const[tierF,setTierF]=useState('all');
  const[yearF,setYearF]=useState(DEFAULT_YEAR);
  const[monthF,setMonthF]=useState('all');

  const filtered = useMemo(()=>allClients.filter(c=>{
    if(tierF!=='all'&&c.tier!==tierF)return false;
    if(q&&!c.name.includes(q)&&!c.code.includes(q))return false;
    const s=M.salesByClient[c.code];
    if(!s)return false;
    const mo=filterClientMonths(s.mo,yearF,monthF);
    const sum=sumMonths(mo);
    if(sum.r===0&&sum.p===0)return false;
    return true;
  }).map(c=>{
    const s=M.salesByClient[c.code];
    const mo=filterClientMonths(s.mo,yearF,monthF);
    const sum=sumMonths(mo);
    return{...c,_sum:sum,_mo:mo,_s:s};
  }).sort((a,b)=>b._sum.r-a._sum.r),[q,tierF,yearF,monthF]);

  const[code,setCode]=useState('');
  useEffect(()=>{if(filtered.length>0&&!filtered.find(c=>c.code===code))setCode(filtered[0].code)},[filtered]);

  const cli = filtered.find(c=>c.code===code);

  if(!M.clients||M.clients.length===0){
    return <div className="card" style={{padding:40,textAlign:'center',color:'#94a3b8'}}><p>尚未載入客戶主檔</p></div>;
  }

  // Typeahead 顯示控制
  const[showDD,setShowDD]=useState(false);
  const[focusIdx,setFocusIdx]=useState(0);
  const ddRef=useRef(null);
  useEffect(()=>{
    const handler=e=>{if(ddRef.current&&!ddRef.current.contains(e.target))setShowDD(false)};
    document.addEventListener('mousedown',handler);
    return()=>document.removeEventListener('mousedown',handler);
  },[]);
  const displayName = cli? `${cli.name} · $${Math.round(cli._sum.r).toLocaleString()}` : '';

  // 月份排序
  const monthList = Object.keys(cli?._mo||{}).sort();
  const monthLabels = monthList.map(k=>k.length>=7?k.slice(2,4)+'/'+k.slice(5,7):k);

  return(<div>
    <h2 style={{fontSize:18,fontWeight:600,marginBottom:16}}>🌟 客戶儀表板</h2>

    <div className="card sticky-bar" style={{padding:12,marginBottom:16,position:'sticky',top:56,zIndex:20,background:'#fff',boxShadow:'0 2px 8px rgba(0,0,0,.04)'}}>
      <div style={{display:'flex',gap:8,alignItems:'flex-end',flexWrap:'wrap'}}>
        <F l="年度"><select value={yearF} onChange={e=>setYearF(e.target.value)} style={{minWidth:90}}>
          <option value="all">全部</option>
          {ALL_YEARS.map(y=><option key={y} value={y}>{y}</option>)}
        </select></F>
        <F l="月份"><select value={monthF} onChange={e=>setMonthF(e.target.value)} style={{minWidth:80}}>
          <option value="all">全部</option>
          {MONTHS.map(m=><option key={m} value={m}>{m}</option>)}
        </select></F>
        <F l="類型"><select value={tierF} onChange={e=>setTierF(e.target.value)}>
          <option value="all">全部</option><option value="dp">經銷商</option><option value="cp">特約商</option><option value="live">直播主</option><option value="sp">阿清</option>
        </select></F>
        <F l={`搜尋客戶（${filtered.length} 位有交易）`}>
          <div ref={ddRef} style={{position:'relative',width:320}}>
            <input type="text"
              value={showDD? q : (cli?displayName:q)}
              onChange={e=>{setQ(e.target.value);setShowDD(true);setFocusIdx(0)}}
              onFocus={()=>{setShowDD(true);setQ('')}}
              onKeyDown={e=>{
                if(e.key==='ArrowDown'){e.preventDefault();setFocusIdx(Math.min(filtered.length-1,focusIdx+1))}
                else if(e.key==='ArrowUp'){e.preventDefault();setFocusIdx(Math.max(0,focusIdx-1))}
                else if(e.key==='Enter'&&filtered[focusIdx]){setCode(filtered[focusIdx].code);setShowDD(false);setQ('');e.target.blur()}
                else if(e.key==='Escape'){setShowDD(false);e.target.blur()}
              }}
              placeholder="輸入客戶名稱/代號…"
              style={{width:'100%'}}/>
            {showDD&&<div style={{position:'absolute',top:'100%',left:0,right:0,marginTop:2,background:'#fff',border:'1px solid #cbd5e1',borderRadius:6,maxHeight:360,overflow:'auto',boxShadow:'0 4px 16px rgba(0,0,0,.12)',zIndex:100}}>
              {filtered.length===0 && <div style={{padding:10,color:'#94a3b8',fontSize:12}}>找不到相符的客戶</div>}
              {filtered.slice(0,50).map((c,i)=>(
                <div key={c.code}
                  onClick={()=>{setCode(c.code);setShowDD(false);setQ('')}}
                  style={{padding:'8px 10px',cursor:'pointer',fontSize:12,background:i===focusIdx?'#e0f2f4':c.code===code?'#f0fdfa':'#fff',borderBottom:'1px solid #f1f5f9',display:'flex',justifyContent:'space-between',gap:8}}>
                  <span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                    <b>{c.name}</b> <span style={{color:'#94a3b8'}}>({c.code} · {c.sales})</span>
                  </span>
                  <span style={{color:'#0f172a',fontWeight:500,whiteSpace:'nowrap'}}>${Math.round(c._sum.r).toLocaleString()}</span>
                </div>
              ))}
              {filtered.length>50&&<div style={{padding:'6px 10px',fontSize:11,color:'#94a3b8',background:'#f8fafc'}}>顯示前 50 筆，請繼續輸入縮小範圍</div>}
            </div>}
          </div>
        </F>
      </div>
    </div>

    {!cli&&<div className="card" style={{padding:40,textAlign:'center',color:'#94a3b8'}}>此期間無任何客戶交易</div>}

    {cli&&<>
      <div className="card" style={{padding:16,marginBottom:16,background:'linear-gradient(135deg,#1A6A75,#2a8a95)',color:'#fff'}}>
        <div style={{fontSize:12,opacity:.8}}>{cli.code} · {cli.sales}</div>
        <div style={{fontSize:24,fontWeight:700,marginTop:4}}>{cli.name}</div>
        <div style={{fontSize:12,opacity:.85,marginTop:6}}>首次交易 {cli._s.fd} ｜ 最近交易 {cli._s.ld}</div>
      </div>

      <ARAlert cli={cli}/>

      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))',gap:12,marginBottom:16}}>
        <div className="sc s1"><div style={{fontSize:12,opacity:.9}}>期間營業額</div><div style={{fontSize:22,fontWeight:700}}>${Math.round(cli._sum.r).toLocaleString()}</div></div>
        <div className="sc s2"><div style={{fontSize:12,opacity:.9}}>期間毛利</div><div style={{fontSize:22,fontWeight:700}}>${Math.round(cli._sum.p).toLocaleString()}</div></div>
        <div className="sc s3"><div style={{fontSize:12,opacity:.9}}>平均毛利率</div><div style={{fontSize:22,fontWeight:700}}>{cli._sum.mg.toFixed(1)}%</div></div>
        <div className="sc s4"><div style={{fontSize:12,opacity:.9}}>期間數量</div><div style={{fontSize:22,fontWeight:700}}>{Math.round(cli._sum.q).toLocaleString()}</div></div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(360px,1fr))',gap:16,marginBottom:16}}>
        <div className="card" style={{padding:16}}>
          <h3 style={{fontSize:14,fontWeight:600,marginBottom:8}}>📈 月度走勢（含毛利率）</h3>
          <Chart2 type="bar" height={280}
            data={{labels:monthLabels,datasets:[
              {type:'bar',label:'營業額',data:monthList.map(k=>cli._mo[k][0]),backgroundColor:'#1A6A75',yAxisID:'y',order:2},
              {type:'bar',label:'毛利',data:monthList.map(k=>cli._mo[k][1]),backgroundColor:'#3EBAC8',yAxisID:'y',order:3},
              {type:'line',label:'毛利率%',data:monthList.map(k=>cli._mo[k][0]>0?cli._mo[k][1]/cli._mo[k][0]*100:0),borderColor:'#f59e0b',backgroundColor:'#f59e0b',yAxisID:'y1',tension:0.3,order:1,pointRadius:3},
            ]}}
            options={{plugins:{legend:{position:'top'}},scales:{y:{position:'left',beginAtZero:true,ticks:{callback:v=>'$'+(v/1000).toFixed(0)+'K'}},y1:{position:'right',beginAtZero:true,grid:{drawOnChartArea:false},ticks:{callback:v=>v.toFixed(0)+'%'}}}}}
          />
        </div>
        <div className="card" style={{padding:16}}>
          <h3 style={{fontSize:14,fontWeight:600,marginBottom:8}}>🥧 Top 5 產品占比</h3>
          <Chart2 type="doughnut" height={280}
            data={(()=>{const tp=cli._s.tp.filter(p=>!isMaterial(p[0])).slice(0,5);return{labels:tp.map(p=>p[0]),datasets:[{data:tp.map(p=>p[1]),backgroundColor:['#1A6A75','#3EBAC8','#f59e0b','#10b981','#8b5cf6']}]}})()}
            options={{plugins:{legend:{position:'right',labels:{boxWidth:12,font:{size:11}}}}}}
          />
        </div>
      </div>

      <TopProducts cli={cli} yearF={yearF} monthF={monthF}/>

      <ClientTxnDetail cli={cli} yearF={yearF} monthF={monthF}/>
    </>}
  </div>);
}

/* ==================== 👥 客戶主檔 ==================== */
function MasterClients(){
  const all = M.clients||[];
  const[q,setQ]=useState('');
  const[tierF,setTierF]=useState('all');
  const[yearF,setYearF]=useState(DEFAULT_YEAR);
  const[monthF,setMonthF]=useState('all');
  const[sort,setSort]=useState('total');

  const rows = useMemo(()=>{
    return all.map(c=>{
      const s=M.salesByClient[c.code];
      if(!s)return null;
      const mo=filterClientMonths(s.mo,yearF,monthF);
      const sum=sumMonths(mo);
      return{...c,...sum,ld:s.ld};
    }).filter(c=>{
      if(!c)return false;
      if(tierF!=='all'&&c.tier!==tierF)return false;

<span style={{fontSize:10,color:curTier.color,fontWeight:600}}>{curTier.label}價</span><span style={{fontSize:14,fontWeight:700,color:curTier.color}}>${$(price)}</span>
</div>
<div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:6}}>
<span style={{fontSize:10,color:'#64748b'}}>成本 ${$(i.cost)}</span><span className={C(mg)} style={{fontSize:11,fontWeight:600}}>{P(mg)}</span>
</div>
<div style={{display:'flex',gap:4}}>
<button className="bs" onClick={()=>edit(c.id)} style={{flex:1,fontSize:11,padding:'4px 0'}}>編輯</button>
<button className="bd" onClick={()=>del(c.id)} style={{flex:1,fontSize:11,padding:'4px 0'}}>刪除</button>
</div></div>)})}
</div>}

{view==='table'&&<div className="card" style={{overflow:'auto'}}><table><thead><tr>
<th>組合名稱</th><th>組合內容</th><th>官網價</th><th style={{background:curTier.bg}}>{curTier.label}價</th><th>成本</th><th style={{background:curTier.bg}}>{curTier.label}毛利率</th><th>操作</th>
</tr></thead><tbody>
{combos.map(c=>{const i=inf(c);const price=i[tierView]||0;const mg=price>0?(price-i.cost)/price:0;return(
<tr key={c.id}>
<td style={{fontWeight:500}}>{c.name}</td>
<td style={{fontSize:12,color:'#64748b',maxWidth:300}}>{i.ns.join(' + ')}</td>
<td>${$(c.retail||i.ret)}</td>
<td style={{background:curTier.bg,fontWeight:600}}>${$(price)}</td>
<td>${$(i.cost)}</td>
<td style={{background:curTier.bg}}><span className={C(mg)}>{P(mg)}</span></td>
<td style={{whiteSpace:'nowrap'}}>
<button className="bs" onClick={()=>edit(c.id)} style={{fontSize:12,padding:'4px 10px',marginRight:4}}>編輯</button>
<button className="bd" onClick={()=>del(c.id)} style={{fontSize:12}}>刪除</button>
</td></tr>)})}
</tbody></table></div>}

{sa&&<CModal products={products} combo={eid?combos.find(c=>c.id===eid):null} onSave={save} onClose={()=>{setSa(false);setEid(null)}}/>}
</div>);
}

function CModal({products,combo,onSave,onClose}){
const[name,setName]=useState(combo?.name||'');
const[sp,setSp]=useState(combo?.sp||0);
const[retail,setRetail]=useState(combo?.retail||0);
const[items,setItems]=useState(combo?.items||[{pid:products[0]?.id||1,qty:1}]);
const[autoC,setAutoC]=useState(!combo);
const[autoR,setAutoR]=useState(!combo);

let tCost=0,tDp=0,tCp=0,tSp=0,tRet=0;
items.forEach(it=>{const p=products.find(x=>x.id===it.pid);if(p){tCost+=p.cost*it.qty;tDp+=(p.dp||0)*it.qty;tCp+=(p.cp||0)*it.qty;tSp+=(p.sp||0)*it.qty;tRet+=p.retail*it.qty}});
const fSp=autoC?tSp:sp;const fRet=autoR?tRet:retail;
const mg=fSp>0?(fSp-tCost)/fSp:0;

return(<Modal title={combo?'編輯組合':'新增組合'} onClose={onClose}>{close=>(<div>
<F l="組合名稱"><input type="text" value={name} onChange={e=>setName(e.target.value)} style={{width:'100%'}}/></F>
<div style={{display:'flex',gap:12,flexWrap:'wrap',margin:'12px 0'}}>
<div style={{display:'flex',gap:8,alignItems:'flex-end'}}>
<F l="官網價"><input type="number" value={autoR?tRet:retail} disabled={autoR} onChange={e=>setRetail(+e.target.value)} style={{width:120,opacity:autoR?.5:1}}/></F>
<label style={{fontSize:12,display:'flex',alignItems:'center',gap:4,paddingBottom:6}}><input type="checkbox" checked={autoR} onChange={e=>setAutoR(e.target.checked)}/> 自動</label>
</div>
<div style={{display:'flex',gap:8,alignItems:'flex-end'}}>
<F l="組合特殊價"><input type="number" value={autoC?tSp:sp} disabled={autoC} onChange={e=>setSp(+e.target.value)} style={{width:120,opacity:autoC?.5:1}}/></F>
<label style={{fontSize:12,display:'flex',alignItems:'center',gap:4,paddingBottom:6}}><input type="checkbox" checked={autoC} onChange={e=>setAutoC(e.target.checked)}/> 自動</label>
</div></div>
<div style={{fontSize:12,color:'#64748b',marginBottom:8}}>組合內容</div>
{items.map((it,i)=>(
<div key={i} style={{display:'flex',gap:8,alignItems:'center',marginBottom:8}}>
<select value={it.pid} onChange={e=>{const n=[...items];n[i]={...it,pid:+e.target.value};setItems(n)}} style={{flex:1}}>
{products.map(p=><option key={p.id} value={p.id}>{p.name}（特殊${p.sp||0}）</option>)}
</select><span style={{fontSize:12}}>x</span>
<input type="number" min={1} value={it.qty} onChange={e=>{const n=[...items];n[i]={...it,qty:+e.target.value};setItems(n)}} style={{width:60}}/>
{items.length>1&&<button className="bd" onClick={()=>setItems(items.filter((_,j)=>j!==i))} style={{fontSize:11,padding:'3px 8px'}}>x</button>}
</div>))}
<button className="bs" onClick={()=>setItems([...items,{pid:products[0]?.id,qty:1}])} style={{fontSize:12,marginBottom:12}}>+ 加一項</button>
<div className="ib" style={{marginBottom:16}}>
官網：<b>${$(fRet)}</b> | 經銷：<b>${$(autoC?tDp:0)}</b> | 特約：<b>${$(autoC?tCp:0)}</b> | 特殊：<b>${$(fSp)}</b> | 成本：<b>${$(tCost)}</b> | 毛利率(特殊)：<span className={C(mg)}><b>{P(mg)}</b></span>
</div>
<div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
<button className="bs" onClick={close}>取消</button>
<button className="bp" onClick={()=>{if(name){onSave({name,dp:autoC?0:0,cp:autoC?0:0,sp:fSp,retail:fRet,items});close()}}}>儲存</button>
</div></div>)}</Modal>);
}

/* ==================== 3. 報價試算 ==================== */
function T3({products,combos,clients,sCl,events,sE}){
const[cid,setCid]=useState(clients[0]?.id||0);
const[eName,setEN]=useState('');
const[eDate,setED]=useState(new Date().toISOString().slice(0,10));
const[rows,setRows]=useState([]);
const[shipMode,setSM]=useState('lump');
const[shipLump,setSL]=useState(0);
const[shipPer,setSP]=useState(150);
const[liveRate,setLiveRate]=useState(1);  // 直播價折數（1=不打折，0.8=八折）
const[showAC,setSAC]=useState(false);
const[tierF,setTierF]=useState('all');
const[clQ,setClQ]=useState('');
const filteredCl=useMemo(()=>clients.filter(c=>{
  if(tierF!=='all'){
    // 支援按 tier 或 stype 篩選（直播主/團購主等細分類）
    if(tierF==='live'){if(c.stype!=='直播主')return false}
    else if(c.tier!==tierF)return false;
  }
  if(clQ&&!c.name.toLowerCase().includes(clQ.toLowerCase()))return false;
  return true;
}),[clients,tierF,clQ]);
// 類型/搜尋變動時，若目前選的客戶不在過濾結果內，自動切到第一個
useEffect(()=>{
  if(filteredCl.length>0 && !filteredCl.find(c=>c.id===cid)){
    setCid(filteredCl[0].id);
  }
},[tierF,clQ,filteredCl]);
const[evComm,setEvComm]=useState(null);

const cl=clients.find(c=>c.id===cid);
const tier=cl?.tier||'cp';
const tierLabel={'dp':'經銷價','cp':'特約價','sp':'特殊價'}[tier]||'特約價';
const comm=evComm!==null?evComm:(cl?.commission||0);
useEffect(()=>{setEvComm(null)},[cid]);

const addR=t=>setRows([...rows,t==='s'?{type:'s',pid:products[0]?.id,qty:100,lp:0,clp:false,cpo:0,ccp:false}:{type:'c',cid:combos[0]?.id,qty:100,lp:0,clp:false,cpo:0,ccp:false}]);
const upR=(i,u)=>setRows(rows.map((r,j)=>j===i?{...r,...u}:r));
const rmR=i=>setRows(rows.filter((_,j)=>j!==i));

const calcR=row=>{
  let dCp=0,unitCost=0,name='',dLive=0,dRetail=0;
  if(row.type==='s'){
    const p=products.find(x=>x.id===row.pid);if(!p)return{};
    name=p.name;dCp=p[tier]||p.cp;unitCost=p.cost;dLive=p.retail;dRetail=p.retail;
  }else{
    const c=combos.find(x=>x.id===row.cid);if(!c)return{};
    name=c.name;dCp=c[tier]||0;dRetail=c.retail||0;dLive=dRetail;
    c.items.forEach(it=>{const p=products.find(x=>x.id===it.pid);if(p){unitCost+=p.cost*it.qty;if(!dRetail)dLive+=p.retail*it.qty;if(!dCp)dCp+=(p[tier]||p.cp)*it.qty}});
  }
  // 套用直播折數（四捨五入到整數元）
  const dLiveDiscounted=Math.round(dLive*liveRate);
  const cp=row.ccp?row.cpo:dCp;
  const lp=row.clp?row.lp:dLiveDiscounted;
  const retail=dRetail||dLive;
  const totalCost=unitCost*row.qty;
  const perShip=shipMode==='perItem'?shipPer*row.qty:0;
  const vendorProfit=lp-cp;
  const vendorMargin=lp>0?vendorProfit/lp:0;
  const netRevenue=cp*row.qty;
  const commAmt=comm>0?netRevenue*comm:0;
  const netProfit=netRevenue-totalCost-commAmt-perShip;
  const netMargin=netRevenue>0?netProfit/netRevenue:0;
  return{name,cp,dCp,lp,dLive:dLiveDiscounted,unitCost,retail,vendorProfit,vendorMargin,netRevenue,totalCost,netProfit,netMargin,commAmt,perShip};
};

const sum=useMemo(()=>{
  let rev=0,cost=0,profit=0,comT=0,shipT=0;
  rows.forEach(r=>{const c=calcR(r);rev+=c.netRevenue||0;cost+=c.totalCost||0;profit+=c.netProfit||0;comT+=c.commAmt||0;shipT+=c.perShip||0});
  if(shipMode==='lump'){profit-=shipLump}
  const totalCostAll=cost+comT+(shipMode==='lump'?shipLump:shipT);
  return{rev,totalCostAll,profit,margin:rev>0?profit/rev:0,comT,shipT};
},[rows,shipMode,shipLump,shipPer,cid,evComm,liveRate]);

const saveEv=()=>{
  if(!eName){alert('請輸入場次名稱');return}
  const d=eDate?new Date(eDate):new Date();
  const totalShip=shipMode==='lump'?shipLump:sum.shipT;
  const ev={id:Date.now(),name:eName,client:cl?.name||'',commission:comm,tier:cl?.tier||'cp',liveRate,
    date:eDate,year:d.getFullYear(),month:d.getMonth()+1,
    totalRevenue:sum.rev,totalCost:sum.totalCostAll,totalProfit:sum.profit,totalMargin:sum.margin,
    shipping:totalShip,shipMode,
    rows:rows.map(r=>({...r,calc:calcR(r)}))};
  sE([...events,ev]);
  alert('已儲存至場次總表！');
};

const addCl=data=>{const nid=Math.max(0,...clients.map(c=>c.id))+1;sCl([...clients,{...data,id:nid}]);setCid(nid);setSAC(false)};
const editCl=(id,data)=>{sCl(clients.map(c=>c.id===id?{...c,...data}:c))};
const delCl=id=>{if(!confirm('確定刪除此客戶？'))return;sCl(clients.filter(c=>c.id!==id));if(cid===id)setCid(clients[0]?.id||0)};
const[showEC,setSEC]=useState(false);
const[editClData,setECD]=useState(null);

const hasComm=comm>0;
const colSpan=(hasComm?14:13)+1;  // +1 for 單位成本

return(<div>
<div className="card" style={{padding:20,marginBottom:16}}>
<div style={{display:'flex',gap:16,alignItems:'flex-end',flexWrap:'wrap'}}>
<F l="場次名稱"><input type="text" placeholder="例：11504月直播" value={eName} onChange={e=>setEN(e.target.value)} style={{width:180}}/></F>
<F l="日期"><input type="text" placeholder="YYYY-MM-DD" value={eDate} onChange={e=>setED(e.target.value)} style={{width:120}}/></F>
<F l="廠商類型"><select value={tierF} onChange={e=>{setTierF(e.target.value);setClQ('')}} style={{minWidth:100}}>
<option value="all">全部</option><option value="dp">經銷商</option><option value="cp">特約商</option><option value="live">直播主</option><option value="sp">特殊</option>
</select></F>
<F l="搜尋廠商"><input type="text" placeholder="輸入名稱搜尋..." value={clQ} onChange={e=>setClQ(e.target.value)} style={{width:140}}/></F>
<F l="廠商名稱"><div style={{display:'flex',gap:4}}>
<select value={cid} onChange={e=>setCid(+e.target.value)} style={{minWidth:150}}>
{filteredCl.map(c=><option key={c.id} value={c.id}>{c.name}{c.commission>0?` (${(c.commission*100)}%)`:''}</option>)}
{filteredCl.length===0&&<option value="">無符合廠商</option>}
</select>
<button className="bs" onClick={()=>setSAC(true)} style={{fontSize:12,padding:'4px 8px'}}>+</button>
{cl&&<button className="bs" onClick={()=>{setECD({...cl});setSEC(true)}} style={{fontSize:12,padding:'4px 8px'}}>✏️</button>}
{cl&&clients.length>1&&<button className="bd" onClick={()=>delCl(cl.id)} style={{fontSize:12,padding:'4px 8px'}}>🗑</button>}</div></F>
{cl&&cl.commission>0&&<F l={`本場分潤（預設${(cl.commission*100)}%）`}>
<input type="number" step=".01" value={evComm!==null?evComm:cl.commission} onChange={e=>setEvComm(+e.target.value)} style={{width:80}}/></F>}
</div>
<div style={{display:'flex',gap:16,alignItems:'flex-end',flexWrap:'wrap',marginTop:12,paddingTop:12,borderTop:'1px solid #e2e8f0'}}>
<F l="運費模式"><select value={shipMode} onChange={e=>setSM(e.target.value)} style={{minWidth:180}}>
<option value="lump">一筆總運費</option><option value="perItem">每品項加運費（試算用）</option></select></F>
{shipMode==='lump'?<F l="運費總額"><input type="number" value={shipLump} onChange={e=>setSL(+e.target.value)} style={{width:120}}/></F>
:<F l="每品項運費"><input type="number" value={shipPer} onChange={e=>setSP(+e.target.value)} style={{width:100}}/></F>}
{shipMode==='perItem'&&<div style={{fontSize:12,color:'#d97706',paddingBottom:6}}>* 每組加 ${shipPer}，結束後可在場次總表改為實際運費</div>}
<F l="直播折數"><select value={liveRate} onChange={e=>setLiveRate(+e.target.value)} style={{minWidth:90}}>
<option value={1}>不打折</option>
<option value={0.95}>95折</option>
<option value={0.9}>9折</option>
<option value={0.85}>85折</option>
<option value={0.8}>8折</option>
<option value={0.75}>75折</option>
<option value={0.7}>7折</option>
<option value={0.65}>65折</option>
<option value={0.6}>6折</option>
<option value={0.55}>55折</option>
<option value={0.5}>5折</option>
</select></F>
<div style={{fontSize:12,color:'#64748b',paddingBottom:6}}>直播價 = 官網價 × {liveRate}（可在表格中個別調整）</div>
</div>
{cl&&<div className="ib" style={{marginTop:12}}><b>{cl.name}</b><span style={{background:'#e6f7fa',color:'#1a6a75',padding:'2px 8px',borderRadius:4,fontSize:12,marginLeft:8}}>{tierLabel}</span>{hasComm&&<span> · 本場分潤 {(comm*100).toFixed(0)}%</span>}{cl.note&&<span style={{color:'#64748b'}}> · {cl.note}</span>}</div>}
</div>

<div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:16}}>
<div className="sc s2"><div style={{fontSize:12,opacity:.9}}>淨淨營業額</div><div style={{fontSize:22,fontWeight:700}}>${$(sum.rev)}</div></div>
<div className="sc s4"><div style={{fontSize:12,opacity:.9}}>總成本{hasComm?'(含分潤)':''}</div><div style={{fontSize:22,fontWeight:700}}>${$(sum.totalCostAll)}</div></div>
<div className="sc s3"><div style={{fontSize:12,opacity:.9}}>淨淨利潤</div><div style={{fontSize:22,fontWeight:700}}>${$(sum.profit)}</div></div>
<div className="sc s1"><div style={{fontSize:12,opacity:.9}}>淨淨毛利率</div><div style={{fontSize:22,fontWeight:700}}>{P(sum.margin)}</div></div>
</div>

<div style={{display:'flex',gap:8,marginBottom:12}}>
<button className="bp" onClick={()=>addR('s')}>+ 加單品</button>
<button className="bp" onClick={()=>addR('c')}>+ 加組合</button>
<div style={{flex:1}}/>
<button className="bg" onClick={saveEv}>&#128190; 儲存為場次紀錄</button>
</div>

<div className="card" style={{overflow:'auto'}}><table><thead><tr>
<th>類型</th><th>品項</th><th>組數</th><th>官網價</th>
<th className="eh">直播價 &#9998;</th><th className="eh">{tierLabel} &#9998;</th>
<th>廠商利潤</th><th>廠商毛利</th>
<th>淨淨營業額</th><th style={{color:'#64748b'}}>單位成本</th><th>淨淨成本</th>
{hasComm&&<th>分潤</th>}
{shipMode==='perItem'&&<th>運費</th>}
<th>淨淨利潤</th><th>毛利率</th><th></th>
</tr></thead><tbody>
{rows.map((r,i)=>{const c=calcR(r);return(
<tr key={i}>
<td><span className={`tag ${r.type==='s'?'tbl':'tgr'}`}>{r.type==='s'?'單品':'組合'}</span></td>
<td>{r.type==='s'
  ?<select value={r.pid} onChange={e=>upR(i,{pid:+e.target.value,clp:false,ccp:false})} style={{minWidth:200}}>{products.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}</select>
  :<select value={r.cid} onChange={e=>upR(i,{cid:+e.target.value,clp:false,ccp:false})} style={{minWidth:200}}>{combos.map(cb=><option key={cb.id} value={cb.id}>{cb.name}</option>)}</select>}</td>
<td><input type="number" min={0} value={r.qty} onChange={e=>upR(i,{qty:+e.target.value})} style={{width:70}}/></td>
<td style={{color:'#64748b'}}>${$(c.retail)}</td>
<td className="eh"><input type="number" value={r.clp?r.lp:c.dLive} onChange={e=>upR(i,{lp:+e.target.value,clp:true})} style={{width:85}}/></td>
<td className="eh"><input type="number" value={r.ccp?r.cpo:c.dCp} onChange={e=>upR(i,{cpo:+e.target.value,ccp:true})} style={{width:85}}/></td>
<td style={{color:c.vendorProfit>=0?'#059669':'#dc2626'}}>${$(c.vendorProfit)}</td>
<td><span className={C(c.vendorMargin)}>{P(c.vendorMargin)}</span></td>
<td style={{fontWeight:500}}>${$(c.netRevenue)}</td>
<td style={{color:'#64748b'}}>${$(c.unitCost)}</td>
<td>${$(c.totalCost)}</td>
{hasComm&&<td style={{color:'#d97706'}}>${$(c.commAmt)}</td>}
{shipMode==='perItem'&&<td style={{color:'#92400e'}}>${$(c.perShip)}</td>}
<td style={{fontWeight:600,color:c.netProfit>=0?'#059669':'#dc2626'}}>${$(c.netProfit)}</td>
<td><span className={C(c.netMargin)}>{P(c.netMargin)}</span></td>
<td><button className="bd" onClick={()=>rmR(i)} style={{fontSize:11}}>x</button></td>
</tr>)})}
{shipMode==='lump'&&shipLump>0&&<tr className="ship-row"><td colSpan={colSpan-4}></td><td colSpan={2} style={{textAlign:'right',color:'#92400e'}}>運費</td><td style={{fontWeight:600,color:'#dc2626'}}>-${$(shipLump)}</td><td colSpan={2}></td></tr>}
{rows.length===0&&<tr><td colSpan={colSpan} style={{textAlign:'center',padding:32,color:'#94a3b8'}}>點擊上方按鈕加入品項開始報價</td></tr>}
</tbody></table></div>

{showAC&&<Modal title="新增廠商" onClose={()=>setSAC(false)}>{close=>{
const[d,sD]=useState({name:'',commission:0,note:'',tier:'cp'});
return(<div>
<div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
<F l="名稱"><input type="text" value={d.name} onChange={e=>sD({...d,name:e.target.value})} style={{width:'100%'}}/></F>
<F l="價格類型"><select value={d.tier} onChange={e=>sD({...d,tier:e.target.value})} style={{width:'100%'}}><option value="dp">經銷價</option><option value="cp">特約價</option><option value="sp">特殊價</option></select></F>
<F l="分潤比例 (0=無)"><input type="number" step=".01" value={d.commission} onChange={e=>sD({...d,commission:+e.target.value})} style={{width:'100%'}}/></F>
<F l="備註"><input type="text" value={d.note} onChange={e=>sD({...d,note:e.target.value})} style={{width:'100%'}}/></F>
</div>
<div style={{display:'flex',gap:8,justifyContent:'flex-end',marginTop:20}}>
<button className="bs" onClick={close}>取消</button>
<button className="bp" onClick={()=>{if(!d.name)return;addCl(d);close()}}>新增</button>
</div></div>)}}</Modal>}

{showEC&&editClData&&<Modal title="編輯客戶資料" onClose={()=>setSEC(false)}>{close=>{
const[d,sD]=useState({...editClData});
return(<div>
<div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
<F l="名稱"><input type="text" value={d.name} onChange={e=>sD({...d,name:e.target.value})} style={{width:'100%'}}/></F>

</div></div>)}}</Modal>}
