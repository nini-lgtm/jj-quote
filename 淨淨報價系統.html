/* ==================== 4. 數據分析（四合一）==================== */
function T4({products,combos,events,clients}){
const[sub,setSub]=useState(0);
const subs=['數據總覽','廠商業績','定價模擬'];

/* ---------- A. 數據總覽（含年月篩選）---------- */
function ViewDashboard(){
  const[dyF,setDyF]=useState('全部');const[dmF,setDmF]=useState('全部');
  const allYears=['全部',...new Set(events.map(e=>e.year).filter(Boolean))];
  const allMonths=['全部',...[...new Set(events.map(e=>e.month).filter(Boolean))].sort((a,b)=>a-b)];
  const fEv=events.filter(e=>(dyF==='全部'||e.year===+dyF)&&(dmF==='全部'||e.month===+dmF));

  const totR=fEv.reduce((s,e)=>s+e.totalRevenue,0);
  const totP=fEv.reduce((s,e)=>s+e.totalProfit,0);
  const avgM=totR>0?totP/totR:0;
  // 按廠商分組
  const byClient={};fEv.forEach(e=>{if(!byClient[e.client])byClient[e.client]={rev:0,profit:0,count:0};byClient[e.client].rev+=e.totalRevenue;byClient[e.client].profit+=e.totalProfit;byClient[e.client].count++});
  const clientArr=Object.entries(byClient).sort((a,b)=>b[1].rev-a[1].rev);
  const maxClientRev=Math.max(1,...clientArr.map(([,v])=>v.rev));
  // 按月份分組
  const byMonth={};fEv.forEach(e=>{const k=`${e.year||''}-${String(e.month||'').padStart(2,'0')}`;if(!byMonth[k])byMonth[k]={rev:0,profit:0,count:0};byMonth[k].rev+=e.totalRevenue;byMonth[k].profit+=e.totalProfit;byMonth[k].count++});
  const monthArr=Object.entries(byMonth).sort((a,b)=>a[0].localeCompare(b[0]));
  const maxMonthRev=Math.max(1,...monthArr.map(([,v])=>v.rev));
  // 熱銷品項（從場次明細統計）
  const itemStats={};fEv.forEach(e=>(e.rows||[]).forEach(r=>{const c=r.calc||{};const n=c.name||'';if(!n)return;if(!itemStats[n])itemStats[n]={qty:0,rev:0,profit:0};itemStats[n].qty+=r.qty||0;itemStats[n].rev+=c.netRevenue||0;itemStats[n].profit+=c.netProfit||0}));
  const topItems=Object.entries(itemStats).sort((a,b)=>b[1].qty-a[1].qty).slice(0,10);
  const maxQty=Math.max(1,...topItems.map(([,v])=>v.qty));

  if(!events.length)return(<div className="card" style={{padding:40,textAlign:'center',color:'#94a3b8'}}>尚無場次資料，請先在「報價試算」儲存場次</div>);

  return(<div>
  {/* 篩選列 */}
  <div className="card" style={{padding:12,marginBottom:16,display:'flex',alignItems:'center',gap:16,flexWrap:'wrap'}}>
  <F l="年度"><select value={dyF} onChange={e=>setDyF(e.target.value)} style={{minWidth:100}}>
  {allYears.map(y=><option key={y} value={y}>{y==='全部'?'全部年度':y+'年'}</option>)}</select></F>
  <F l="月份"><select value={dmF} onChange={e=>setDmF(e.target.value)} style={{minWidth:100}}>
  {allMonths.map(m=><option key={m} value={m}>{m==='全部'?'全部月份':m+'月'}</option>)}</select></F>
  <div style={{flex:1}}/>
  <span style={{fontSize:13,color:'#64748b'}}>篩選結果：<b style={{color:'#1A6A75'}}>{fEv.length}</b> 場</span>
  </div>

  <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:20}}>
  <div className="sc s1"><div style={{fontSize:12,opacity:.9}}>場次數</div><div style={{fontSize:28,fontWeight:700}}>{fEv.length}</div></div>
  <div className="sc s2"><div style={{fontSize:12,opacity:.9}}>累計營業額</div><div style={{fontSize:22,fontWeight:700}}>${$(totR)}</div></div>
  <div className="sc s3"><div style={{fontSize:12,opacity:.9}}>累計利潤</div><div style={{fontSize:22,fontWeight:700}}>${$(totP)}</div></div>
  <div className="sc s4"><div style={{fontSize:12,opacity:.9}}>平均毛利率</div><div style={{fontSize:22,fontWeight:700}}>{P(avgM)}</div></div>
  </div>

  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:16}}>
  <div className="card" style={{padding:20}}>
  <h3 style={{fontSize:15,fontWeight:600,marginBottom:16}}>&#128202; 廠商營收貢獻</h3>
  {clientArr.length===0&&<div style={{color:'#94a3b8',textAlign:'center',padding:20}}>此期間無資料</div>}
  {clientArr.map(([name,v])=><div key={name} style={{marginBottom:12}}>
  <div style={{display:'flex',justifyContent:'space-between',fontSize:13,marginBottom:4}}><span style={{fontWeight:500}}>{name} <span style={{color:'#64748b'}}>({v.count}場)</span></span><span style={{fontWeight:600}}>${$(v.rev)}</span></div>
  <div className="bar-c"><div className="bar-f" style={{width:(v.rev/maxClientRev*100)+'%',background:'linear-gradient(90deg,#3EBAC8,#2DA3B2)'}}/></div>
  <div style={{fontSize:11,color:'#64748b',marginTop:2}}>利潤 ${$(v.profit)} · 毛利率 {P(v.rev>0?v.profit/v.rev:0)}</div>
  </div>)}
  </div>

  <div className="card" style={{padding:20}}>
  <h3 style={{fontSize:15,fontWeight:600,marginBottom:16}}>&#128197; 月度營收趨勢</h3>
  {monthArr.length===0&&<div style={{color:'#94a3b8',textAlign:'center',padding:20}}>此期間無資料</div>}
  {monthArr.map(([month,v])=><div key={month} style={{marginBottom:12}}>
  <div style={{display:'flex',justifyContent:'space-between',fontSize:13,marginBottom:4}}><span style={{fontWeight:500}}>{month}</span><span style={{fontWeight:600}}>${$(v.rev)}</span></div>
  <div style={{display:'flex',gap:4,alignItems:'center'}}>
  <div className="bar-c" style={{flex:1}}><div className="bar-f" style={{width:(v.rev/maxMonthRev*100)+'%',background:'linear-gradient(90deg,#10b981,#38ef7d)'}}/></div>
  <span style={{fontSize:11,color:v.profit>=0?'#059669':'#dc2626',minWidth:80,textAlign:'right'}}>利潤 ${$(v.profit)}</span>
  </div></div>)}
  </div>
  </div>

  <div className="card" style={{padding:20}}>
  <h3 style={{fontSize:15,fontWeight:600,marginBottom:16}}>&#128293; 熱銷品項 TOP 10（依總銷售組數）</h3>
  {topItems.map(([name,v],i)=><div key={name} style={{display:'flex',alignItems:'center',gap:12,marginBottom:10}}>
  <span style={{width:24,textAlign:'center',fontSize:14,fontWeight:700,color:i<3?'#3EBAC8':'#94a3b8'}}>{i+1}</span>
  <span style={{width:260,fontSize:13,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{name}</span>
  <div style={{flex:1}}><div className="bar-c"><div className="bar-f" style={{width:(v.qty/maxQty*100)+'%',background:i<3?'linear-gradient(90deg,#f59e0b,#f2c94c)':'#e2e8f0'}}/></div></div>
  <span style={{width:60,textAlign:'right',fontSize:13,fontWeight:600}}>{v.qty}組</span>
  <span style={{width:100,textAlign:'right',fontSize:12,color:'#64748b'}}>營收 ${$(v.rev)}</span>
  </div>)}
  {topItems.length===0&&<div style={{color:'#94a3b8',textAlign:'center',padding:20}}>尚無品項銷售資料</div>}
  </div>
  </div>);
}

/* ---------- B. 廠商業績總覽（含篩選 + 年月）---------- */
function ViewVendorPerf(){
  const[vF,setVF]=useState('全部');
  const[vyF,setVyF]=useState('全部');const[vmF,setVmF]=useState('全部');
  const[vtF,setVtF]=useState('all');
  const tierMap={'dp':'經銷','cp':'特約','sp':'特殊'};
  const allYears=['全部',...new Set(events.map(e=>e.year).filter(Boolean))];
  const allMonths=['全部',...[...new Set(events.map(e=>e.month).filter(Boolean))].sort((a,b)=>a-b)];
  // 查找事件的 tier 及 stype
  const evTier=e=>{if(e.tier)return e.tier;const c=(clients||[]).find(c=>c.name===e.client);return c?.tier||'cp';};
  const evStype=e=>{const c=(clients||[]).find(c=>c.name===e.client);return c?.stype||'';};
  // 先按年月+類型篩選
  const fEv=events.filter(e=>{
    if(vyF!=='全部'&&e.year!==+vyF)return false;
    if(vmF!=='全部'&&e.month!==+vmF)return false;
    if(vtF!=='all'){
      if(vtF==='live'){if(evStype(e)!=='直播主')return false}
      else if(evTier(e)!==vtF)return false;
    }
    return true;
  });
  const byClient={};fEv.forEach(e=>{const k=e.client||'未知';if(!byClient[k])byClient[k]={rev:0,profit:0,cost:0,count:0,comm:0,events:[]};
    byClient[k].rev+=e.totalRevenue;byClient[k].profit+=e.totalProfit;byClient[k].cost+=e.totalCost;byClient[k].count++;byClient[k].comm=e.commission||byClient[k].comm;byClient[k].events.push(e)});
  const allNames=['全部',...Object.keys(byClient).sort()];
  const arr=vF==='全部'?Object.entries(byClient).sort((a,b)=>b[1].rev-a[1].rev):Object.entries(byClient).filter(([k])=>k===vF);
  // 總計
  const totals=arr.reduce((a,[,v])=>({rev:a.rev+v.rev,profit:a.profit+v.profit,count:a.count+v.count}),{rev:0,profit:0,count:0});

  if(!events.length)return(<div className="card" style={{padding:40,textAlign:'center',color:'#94a3b8'}}>尚無場次資料</div>);

  return(<div>
  {/* 篩選列 */}
  <div className="card" style={{padding:12,marginBottom:16,display:'flex',alignItems:'center',gap:16,flexWrap:'wrap'}}>
  <F l="年度"><select value={vyF} onChange={e=>setVyF(e.target.value)} style={{minWidth:100}}>
  {allYears.map(y=><option key={y} value={y}>{y==='全部'?'全部年度':y+'年'}</option>)}</select></F>
  <F l="月份"><select value={vmF} onChange={e=>setVmF(e.target.value)} style={{minWidth:100}}>
  {allMonths.map(m=><option key={m} value={m}>{m==='全部'?'全部月份':m+'月'}</option>)}</select></F>
  <F l="類型"><select value={vtF} onChange={e=>setVtF(e.target.value)} style={{minWidth:100}}>
  <option value="all">全部類型</option><option value="dp">經銷</option><option value="cp">特約</option><option value="live">直播主</option><option value="sp">特殊</option>
  </select></F>
  <F l="廠商"><select value={vF} onChange={e=>setVF(e.target.value)} style={{minWidth:160}}>
  {allNames.map(n=><option key={n} value={n}>{n==='全部'?'全部廠商 ('+Object.keys(byClient).length+')':n}</option>)}
  </select></F>
  <div style={{flex:1}}/>
  <div style={{fontSize:13,color:'#64748b'}}>顯示 <b style={{color:'#1A6A75'}}>{arr.length}</b> 家廠商 · <b>{totals.count}</b> 場</div>
  </div>

  {/* 摘要卡片 */}
  <div style={{display:'grid',gridTemplateColumns:'repeat('+Math.min(arr.length,4)+',1fr)',gap:12,marginBottom:20}}>
  {arr.map(([name,v],i)=><div key={name} className="sc" style={{background:['linear-gradient(135deg,#2DA3B2,#3EBAC8)','linear-gradient(135deg,#f59e0b,#fbbf24)','linear-gradient(135deg,#8b5cf6,#a78bfa)','linear-gradient(135deg,#10b981,#34d399)'][i%4]}}>
  <div style={{fontSize:13,opacity:.9,marginBottom:4}}>{name}</div>
  <div style={{fontSize:24,fontWeight:700}}>${$(v.rev)}</div>
  <div style={{fontSize:12,opacity:.8,marginTop:4}}>{v.count}場 · 利潤 ${$(v.profit)} · 毛利率 {P(v.rev>0?v.profit/v.rev:0)}</div>
  </div>)}
  </div>

  {/* 明細表 */}
  {arr.map(([name,v])=><div key={name} className="card" style={{padding:20,marginBottom:16}}>
  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
  <h3 style={{fontSize:16,fontWeight:600}}>{name} {(()=>{const t=evTier(v.events[0]);return t?<span style={{fontSize:11,padding:'2px 8px',borderRadius:4,background:t==='dp'?'#fff7ed':t==='sp'?'#fef3c7':'#e6f7fa',color:t==='dp'?'#92400e':t==='sp'?'#92400e':'#1a6a75',marginLeft:4}}>{tierMap[t]||t}</span>:null})()} <span style={{fontSize:13,color:'#64748b',fontWeight:400}}>· {v.count}場 {v.comm>0?`· 分潤${(v.comm*100).toFixed(0)}%`:''}</span></h3>
  <div style={{display:'flex',gap:16,fontSize:13}}>
  <span>營業額 <b>${$(v.rev)}</b></span>
  <span>利潤 <b style={{color:v.profit>=0?'#059669':'#dc2626'}}>${$(v.profit)}</b></span>
  <span>毛利率 <b className={C(v.rev>0?v.profit/v.rev:0)}>{P(v.rev>0?v.profit/v.rev:0)}</b></span>
  </div></div>
  <table><thead><tr><th>場次</th><th>日期</th><th>營業額</th><th>成本</th><th>運費</th><th>利潤</th><th>毛利率</th></tr></thead>
  <tbody>{v.events.sort((a,b)=>(b.date||'').localeCompare(a.date||'')).map(e=><tr key={e.id}>
  <td style={{fontWeight:500}}>{e.name}</td><td>{e.date}</td>
  <td>${$(e.totalRevenue)}</td><td>${$(e.totalCost)}</td><td>${$(e.shipping||0)}</td>
  <td style={{fontWeight:600,color:e.totalProfit>=0?'#059669':'#dc2626'}}>${$(e.totalProfit)}</td>
  <td><span className={C(e.totalMargin)}>{P(e.totalMargin)}</span></td>
  </tr>)}</tbody></table>
  </div>)}
  </div>);
}

/* ---------- D. 定價模擬（原廠商比較）---------- */
function ViewPriceSim(){
  const[sel,setSel]=useState([]);const[type,setType]=useState('single');const[sim,setSim]=useState(.7);
  const add=id=>{if(!sel.includes(id))setSel([...sel,id])};const rm=id=>setSel(sel.filter(x=>x!==id));
  const list=type==='combo'?combos:products;
  const data=useMemo(()=>sel.map(id=>{
    let name,cp,cost,retail;
    if(type==='combo'){const c=combos.find(x=>x.id===id);if(!c)return null;let tc=0,tr=0,tSp=0;c.items.forEach(it=>{const p=products.find(x=>x.id===it.pid);if(p){tc+=p.cost*it.qty;tr+=p.retail*it.qty;tSp+=(p.sp||0)*it.qty}});name=c.name;cp=c.sp||tSp;cost=tc;retail=c.retail||tr}
    else{const p=products.find(x=>x.id===id);if(!p)return null;name=p.name;cp=p.sp||p.cp;cost=p.cost;retail=p.retail}
    const profit=cp-cost,mg=cp>0?profit/cp:0,sCp=Math.round(retail*sim),sP=sCp-cost,sM=sCp>0?sP/sCp:0;
    return{id,name,cp,cost,retail,profit,mg,sCp,sP,sM}
  }).filter(Boolean).sort((a,b)=>b.mg-a.mg),[sel,sim,type]);

  return(<div>
  <div className="card" style={{padding:16,marginBottom:16}}>
  <div style={{display:'flex',gap:16,alignItems:'flex-end',flexWrap:'wrap'}}>
  <div><label style={{fontSize:12,color:'#64748b'}}>類型</label><br/><select value={type} onChange={e=>{setType(e.target.value);setSel([])}}><option value="single">單品</option><option value="combo">組合</option></select></div>
  <div style={{flex:1,minWidth:250}}><label style={{fontSize:12,color:'#64748b'}}>加入比較</label><br/>
  <select onChange={e=>{if(e.target.value)add(+e.target.value);e.target.value=''}} style={{width:'100%'}}><option value="">— 選擇 —</option>{list.filter(x=>!sel.includes(x.id)).map(x=><option key={x.id} value={x.id}>{x.name}</option>)}</select></div>
  <button className="bs" onClick={()=>setSel(list.map(x=>x.id))}>全選</button><button className="bs" onClick={()=>setSel([])}>清除</button>
  </div></div>
  {data.length>0&&<>
  <div className="card" style={{padding:20,marginBottom:16}}>
  <h3 style={{fontSize:15,fontWeight:600,marginBottom:4}}>&#127919; 折扣模擬器</h3>
  <p style={{fontSize:12,color:'#64748b',marginBottom:12}}>官網價 x 折數 = 模擬售價，看不同折數下的利潤變化</p>
  <div style={{maxWidth:400,marginBottom:16}}>
  <input type="range" min={.3} max={1} step={.01} value={sim} onChange={e=>setSim(+e.target.value)}/>
  <div style={{display:'flex',justifyContent:'space-between',fontSize:12,color:'#64748b'}}><span>3折</span><span style={{fontWeight:600,color:'#2DA3B2',fontSize:16}}>{(sim*10).toFixed(1)}折</span><span>原價</span></div></div>
  {[...data].sort((a,b)=>b.sM-a.sM).map(d=>{const mx=Math.max(1,...data.map(x=>Math.abs(x.sP)));return(
  <div key={d.id} style={{display:'flex',alignItems:'center',gap:12,marginBottom:8}}>
  <span style={{width:220,fontSize:13,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{d.name}</span>
  <span style={{width:90,fontSize:12,color:'#64748b'}}>模擬 ${$(d.sCp)}</span>
  <div style={{flex:1}}><div className="bar-c"><div className="bar-f" style={{width:Math.max(2,d.sP>0?(d.sP/mx*100):2)+'%',background:d.sM>=.35?'#10b981':d.sM>=.2?'#f59e0b':'#ef4444'}}/></div></div>
  <span style={{width:60,textAlign:'right',fontSize:13}} className={C(d.sM)}>{P(d.sM)}</span>
  <span style={{width:90,textAlign:'right',fontSize:12,color:d.sP>=0?'#059669':'#dc2626'}}>利潤 ${$(d.sP)}</span>
  </div>)})}
  </div>
  <div className="card" style={{overflow:'auto'}}><table><thead><tr>
  <th>品項</th><th>官網價</th><th>現特殊價</th><th>成本</th><th>現利潤</th><th>現毛利</th>
  <th style={{background:'#fef3c7'}}>模擬售價</th><th style={{background:'#fef3c7'}}>模擬利潤</th><th style={{background:'#fef3c7'}}>模擬毛利</th>
  </tr></thead><tbody>{data.map(d=><tr key={d.id}>
  <td style={{fontWeight:500}}>{d.name}</td><td>${$(d.retail)}</td><td style={{fontWeight:600}}>${$(d.cp)}</td><td>${$(d.cost)}</td>
  <td style={{fontWeight:600,color:d.profit>=0?'#059669':'#dc2626'}}>${$(d.profit)}</td><td><span className={C(d.mg)}>{P(d.mg)}</span></td>
  <td style={{background:'#fffbeb',fontWeight:500}}>${$(d.sCp)}</td><td style={{background:'#fffbeb',color:d.sP>=0?'#059669':'#dc2626',fontWeight:600}}>${$(d.sP)}</td>
  <td style={{background:'#fffbeb'}}><span className={C(d.sM)}>{P(d.sM)}</span></td></tr>)}</tbody></table></div>
  </>}
  {sel.length===0&&<div className="card" style={{padding:40,textAlign:'center',color:'#94a3b8'}}>選擇品項即可看利潤排名和模擬</div>}
  </div>);
}

return(<div>
<div style={{display:'flex',gap:6,marginBottom:16}}>
{subs.map((s,i)=><button key={i} onClick={()=>setSub(i)} style={{padding:'8px 18px',borderRadius:8,border:'none',cursor:'pointer',fontWeight:500,fontSize:14,background:sub===i?'#3EBAC8':'#e2f0f1',color:sub===i?'#fff':'#3a7a82'}}>{s}</button>)}
</div>
{sub===0&&<ViewDashboard/>}
{sub===1&&<ViewVendorPerf/>}
{sub===2&&<ViewPriceSim/>}
</div>);
}

/* ==================== 明細編輯元件 ==================== */
function DetailModal({detail,setDetail,dlD,events,sE}){
const[rows,setRows]=useState(()=>detail.rows.map(r=>({...r,calc:{...r.calc}})));
const[ship,setShip]=useState(detail.shipping||0);
const[comm,setComm]=useState(detail.commission||0);
const[liveRate,setLiveRate]=useState(detail.liveRate||1);

const upRow=(i,field,val)=>{
  setRows(rows.map((r,j)=>{
    if(j!==i)return r;
    const nr={...r,calc:{...r.calc}};
    nr.calc[field]=val;
    // recalc row profits
    const c=nr.calc;
    if(field==='unitCost'){c.totalCost=(val||0)*(nr.qty||0);}
    c.vendorProfit=(c.lp||0)-(c.cp||0);
    c.vendorMargin=c.lp>0?c.vendorProfit/c.lp:0;
    c.netRevenue=(c.cp||0)*(nr.qty||0);
    if(field!=='unitCost'){
      const uc=c.unitCost||(c.totalCost/(nr.qty||1));
      c.unitCost=uc;
      c.totalCost=uc*(nr.qty||0);
    }
    const commAmt=comm>0?c.netRevenue*comm:0;
    c.commAmt=commAmt;
    c.netProfit=c.netRevenue-c.totalCost-commAmt;
    c.netMargin=c.netRevenue>0?c.netProfit/c.netRevenue:0;
    return nr;
  }));
};

const upLiveRate=(nr)=>{
  setLiveRate(nr);
  setRows(rows.map(r=>{
    const c={...r.calc};
    const baseLp=c.baseLp||c.lp||0;
    c.baseLp=baseLp;
    c.lp=Math.round(baseLp*nr);
    c.vendorProfit=c.lp-(c.cp||0);
    c.vendorMargin=c.lp>0?c.vendorProfit/c.lp:0;
    return{...r,calc:c};
  }));
};

const upQty=(i,qty)=>{
  setRows(rows.map((r,j)=>{
    if(j!==i)return r;
    const nr={...r,qty};const c={...r.calc};
    c.netRevenue=(c.cp||0)*qty;
    const oldQty=r.qty||1;const unitCost=(c.totalCost||0)/oldQty;
    c.totalCost=unitCost*qty;
    const commAmt=comm>0?c.netRevenue*comm:0;
    c.commAmt=commAmt;
    c.netProfit=c.netRevenue-c.totalCost-commAmt;
    c.netMargin=c.netRevenue>0?c.netProfit/c.netRevenue:0;
    nr.calc=c;return nr;
  }));
};

const totals=useMemo(()=>{
  let rev=0,cost=0,comT=0;
  rows.forEach(r=>{const c=r.calc||{};rev+=c.netRevenue||0;cost+=c.totalCost||0;comT+=c.commAmt||0});
  const totalCost=cost+comT+ship;
  const profit=rev-totalCost;
  const margin=rev>0?profit/rev:0;
  return{rev,totalCost,profit,margin,comT};
},[rows,ship,comm]);

const saveDetail=()=>{
  const updated={...detail,rows,shipping:ship,commission:comm,liveRate,
    totalRevenue:totals.rev,totalCost:totals.totalCost,totalProfit:totals.profit,totalMargin:totals.margin};
  sE(events.map(e=>e.id===detail.id?updated:e));
  setDetail(null);
  alert('明細已更新！');
};

return(<div className="mo" onClick={()=>setDetail(null)}>
<div className="mc" style={{maxWidth:1100}} onClick={e=>e.stopPropagation()}>
<div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
<div><h3 style={{fontSize:18,fontWeight:600}}>{detail.name} - 明細編輯</h3>
<span style={{fontSize:13,color:'#64748b'}}>{detail.client}{comm>0?` · 分潤${(comm*100).toFixed(0)}%`:''} | {detail.date}</span></div>
<div style={{display:'flex',gap:8}}>
<button className="bg" onClick={()=>dlD({...detail,rows,shipping:ship,commission:comm,totalRevenue:totals.rev,totalCost:totals.totalCost,totalProfit:totals.profit,totalMargin:totals.margin},'full')} style={{fontSize:12}}>&#128229; 完整版</button>
<button className="bw" onClick={()=>dlD({...detail,rows,shipping:ship,commission:comm,totalRevenue:totals.rev,totalCost:totals.totalCost,totalProfit:totals.profit,totalMargin:totals.margin},'vendor')} style={{fontSize:12}}>&#128229; 廠商版</button>
<button className="bs" onClick={()=>setDetail(null)}>關閉</button></div></div>

<div style={{display:'flex',gap:12,marginBottom:16,flexWrap:'wrap'}}>
<F l="運費（實際）"><input type="number" value={ship} onChange={e=>setShip(+e.target.value)} style={{width:120}}/></F>
<F l="分潤比例"><input type="number" step=".01" value={comm} onChange={e=>setComm(+e.target.value)} style={{width:100}}/></F>
<F l="直播折數"><select value={liveRate} onChange={e=>upLiveRate(+e.target.value)} style={{width:110}}>
<option value={1}>不打折</option><option value={0.95}>95折</option><option value={0.9}>9折</option><option value={0.85}>85折</option><option value={0.8}>8折</option><option value={0.75}>75折</option><option value={0.7}>7折</option><option value={0.65}>65折</option><option value={0.6}>6折</option><option value={0.55}>55折</option><option value={0.5}>5折</option>
</select></F>
</div>

<div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:16}}>
<div style={{background:'#f0f4f8',borderRadius:8,padding:12,textAlign:'center'}}><div style={{fontSize:12,color:'#64748b'}}>營業額</div><div style={{fontSize:18,fontWeight:700}}>${$(totals.rev)}</div></div>
<div style={{background:'#f0fdf4',borderRadius:8,padding:12,textAlign:'center'}}><div style={{fontSize:12,color:'#64748b'}}>利潤</div><div style={{fontSize:18,fontWeight:700,color:totals.profit>=0?'#059669':'#dc2626'}}>${$(totals.profit)}</div></div>
<div style={{background:'#fffbeb',borderRadius:8,padding:12,textAlign:'center'}}><div style={{fontSize:12,color:'#64748b'}}>運費</div><div style={{fontSize:18,fontWeight:700}}>${$(ship)}</div></div>
<div style={{background:'#fef2f2',borderRadius:8,padding:12,textAlign:'center'}}><div style={{fontSize:12,color:'#64748b'}}>毛利率</div><div style={{fontSize:18,fontWeight:700}}>{P(totals.margin)}</div></div>
</div>

<div style={{overflow:'auto'}}><table><thead><tr>
<th>品項</th><th style={{background:'#fffbeb'}}>組數</th><th>官網價</th>
<th style={{background:'#fffbeb'}}>直播價</th><th style={{background:'#fffbeb'}}>進貨價</th>
<th style={{background:'#e6f7fa'}}>廠商利潤</th><th style={{background:'#e6f7fa'}}>廠商毛利</th>
<th>淨淨營業額</th><th style={{background:'#fffbeb'}}>單位成本</th><th>淨淨成本</th><th>淨淨利潤</th><th>毛利率</th>
</tr></thead><tbody>
{rows.map((r,i)=>{const c=r.calc||{};return(
<tr key={i}>
<td style={{fontWeight:500}}>{c.name}</td>
<td style={{background:'#fffbeb'}}><input type="number" value={r.qty} onChange={e=>upQty(i,+e.target.value)} style={{width:60,padding:'2px 4px',fontSize:13}}/></td>
<td style={{color:'#64748b'}}>${$(c.retail)}</td>
<td style={{background:'#fffbeb'}}><input type="number" value={Math.round(c.lp||0)} onChange={e=>upRow(i,'lp',+e.target.value)} style={{width:70,padding:'2px 4px',fontSize:13}}/></td>
<td style={{background:'#fffbeb'}}><input type="number" value={Math.round(c.cp||0)} onChange={e=>upRow(i,'cp',+e.target.value)} style={{width:70,padding:'2px 4px',fontSize:13}}/></td>
<td style={{background:'#f8fafc',color:c.vendorProfit>=0?'#059669':'#dc2626'}}>${$(c.vendorProfit)}</td>
<td style={{background:'#f8fafc'}}><span className={C(c.vendorMargin)}>{P(c.vendorMargin)}</span></td>
<td>${$(c.netRevenue)}</td>
<td style={{background:'#fffbeb'}}><input type="number" value={Math.round(c.unitCost||(c.totalCost/(r.qty||1))||0)} onChange={e=>upRow(i,'unitCost',+e.target.value)} style={{width:70,padding:'2px 4px',fontSize:13}}/></td>
<td>${$(c.totalCost)}</td>
<td style={{fontWeight:600,color:c.netProfit>=0?'#059669':'#dc2626'}}>${$(c.netProfit)}</td>
<td><span className={C(c.netMargin)}>{P(c.netMargin)}</span></td>
</tr>)})}
</tbody></table></div>

<div style={{display:'flex',gap:8,justifyContent:'flex-end',marginTop:20}}>
<button className="bs" onClick={()=>setDetail(null)}>取消</button>

</div>
</div></div>);
}

/* ==================== 5. 場次總表（可編輯）==================== */
function T5({events,sE,products,combos}){
const[yF,setYF]=useState('全部');const[mF,setMF]=useState('全部');const[cF,setCF]=useState('全部');
const[detail,setDetail]=useState(null);const[editEv,setEditEv]=useState(null);

const ys=['全部',...new Set(events.map(e=>e.year))];
const ms=['全部',...[...new Set(events.map(e=>e.month))].sort((a,b)=>a-b)];
const cs=['全部',...new Set(events.map(e=>e.client))];
const fl=events.filter(e=>(yF==='全部'||e.year===+yF)&&(mF==='全部'||e.month===+mF)&&(cF==='全部'||e.client===cF));
const tot=fl.reduce((a,e)=>({r:a.r+e.totalRevenue,c:a.c+e.totalCost,p:a.p+e.totalProfit}),{r:0,c:0,p:0});
tot.m=tot.r>0?tot.p/tot.r:0;

const dl=async(list,name,mode)=>{try{window._dlXlsx(list,name,mode)}catch(e){console.error(e);alert('下載失敗：'+e.message)}};
const ts=new Date().toISOString().slice(0,10);
const dlAllFull=()=>dl(fl,'淨淨場次總表_完整版_'+ts,'full');
const dlAllVendor=()=>dl(fl,'淨淨場次總表_廠商版_'+ts,'vendor');
const dlD=(ev,mode)=>dl([ev],(ev.name||'報價明細')+'_'+(mode==='vendor'?'廠商版':'完整版'),mode||'full');

const deleteEv=id=>{if(confirm('確定刪除此場次？'))sE(events.filter(e=>e.id!==id))};

const saveEdit=()=>{
  if(!editEv)return;
  // Recalc totals
  const rev=editEv.totalRevenue;const cost=editEv.totalCost;
  const profit=rev-cost;const margin=rev>0?profit/rev:0;
  sE(events.map(e=>e.id===editEv.id?{...editEv,totalProfit:profit,totalMargin:margin}:e));
  setEditEv(null);
};

if(!events.length)return(<div className="card" style={{padding:40,textAlign:'center',color:'#94a3b8'}}>
<p style={{fontSize:16,marginBottom:8}}>尚無場次紀錄</p><p style={{fontSize:13}}>在「報價試算」儲存後即可在此查看</p></div>);

return(<div>
<h2 style={{fontSize:18,fontWeight:600,marginBottom:16}}>場次總表彙整</h2>
<div className="card" style={{padding:16,marginBottom:16}}>
<div style={{display:'flex',gap:16,alignItems:'flex-end',flexWrap:'wrap'}}>
<F l="年度"><select value={yF} onChange={e=>setYF(e.target.value)} style={{minWidth:100}}>{ys.map(y=><option key={y} value={y}>{y==='全部'?'全部':y+'年'}</option>)}</select></F>
<F l="月份"><select value={mF} onChange={e=>setMF(e.target.value)} style={{minWidth:100}}>{ms.map(m=><option key={m} value={m}>{m==='全部'?'全部':m+'月'}</option>)}</select></F>
<F l="廠商"><select value={cF} onChange={e=>setCF(e.target.value)} style={{minWidth:100}}>{cs.map(c=><option key={c} value={c}>{c}</option>)}</select></F>
<div style={{flex:1}}/>
<button className="bg" onClick={dlAllFull} style={{marginRight:8}}>&#128229; 完整版下載</button>
<button className="bw" onClick={dlAllVendor}>&#128229; 廠商版下載</button>
</div></div>

<div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:16}}>
<div className="sc s1"><div style={{fontSize:12,opacity:.9}}>篩選場次</div><div style={{fontSize:28,fontWeight:700}}>{fl.length}</div></div>
<div className="sc s2"><div style={{fontSize:12,opacity:.9}}>累計營業額</div><div style={{fontSize:22,fontWeight:700}}>${$(tot.r)}</div></div>
<div className="sc s3"><div style={{fontSize:12,opacity:.9}}>累計利潤</div><div style={{fontSize:22,fontWeight:700}}>${$(tot.p)}</div></div>
<div className="sc s4"><div style={{fontSize:12,opacity:.9}}>平均毛利率</div><div style={{fontSize:22,fontWeight:700}}>{P(tot.m)}</div></div>
</div>

<div className="card" style={{overflow:'auto'}}><table><thead><tr>
<th>場次</th><th>廠商</th><th>日期</th><th>營業額</th><th>成本</th><th>運費</th><th>利潤</th><th>毛利率</th><th>操作</th>
</tr></thead><tbody>
{fl.map(e=>(
<tr key={e.id}>
<td style={{fontWeight:500}}>{e.name}</td>
<td><span className="tag tbl">{e.client}</span>{e.commission>0&&<span style={{fontSize:11,color:'#d97706',marginLeft:4}}>({(e.commission*100).toFixed(0)}%)</span>}</td>
<td>{e.date}</td>
<td>${$(e.totalRevenue)}</td><td>${$(e.totalCost)}</td><td>${$(e.shipping||0)}</td>
<td style={{fontWeight:600,color:e.totalProfit>=0?'#059669':'#dc2626'}}>${$(e.totalProfit)}</td>
<td><span className={C(e.totalMargin)}>{P(e.totalMargin)}</span></td>
<td style={{whiteSpace:'nowrap'}}>
<button className="bp" onClick={()=>setDetail(e)} style={{fontSize:12,padding:'4px 10px',marginRight:4}}>明細</button>
<button className="bw" onClick={()=>setEditEv({...e})} style={{fontSize:12,padding:'4px 10px',marginRight:4}}>編輯</button>
<button className="bs" onClick={()=>dlD(e,'full')} style={{fontSize:12,padding:'4px 8px',marginRight:2}} title="完整版">&#128229;</button>
<button style={{fontSize:12,padding:'4px 8px',marginRight:4,background:'#fef3c7',border:'1px solid #f59e0b',borderRadius:8,cursor:'pointer'}} onClick={()=>dlD(e,'vendor')} title="廠商版">&#128230;</button>
<button className="bd" onClick={()=>deleteEv(e.id)} style={{fontSize:12}}>刪除</button>
</td></tr>))}
</tbody></table></div>

{/* 明細 Modal（可編輯） */}
{detail&&<DetailModal detail={detail} setDetail={setDetail} dlD={dlD} events={events} sE={sE}/>}

{/* 編輯 Modal */}
{editEv&&<div className="mo" onClick={()=>setEditEv(null)}>
<div className="mc" style={{maxWidth:600}} onClick={e=>e.stopPropagation()}>
<h3 style={{fontSize:18,fontWeight:600,marginBottom:16}}>編輯場次：{editEv.name}</h3>
<div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
<F l="場次名稱"><input type="text" value={editEv.name} onChange={e=>setEditEv({...editEv,name:e.target.value})} style={{width:'100%'}}/></F>
<F l="日期"><input type="text" value={editEv.date} onChange={e=>setEditEv({...editEv,date:e.target.value})} style={{width:'100%'}}/></F>
<F l="廠商"><input type="text" value={editEv.client} onChange={e=>setEditEv({...editEv,client:e.target.value})} style={{width:'100%'}}/></F>
<F l="分潤比例"><input type="number" step=".01" value={editEv.commission||0} onChange={e=>setEditEv({...editEv,commission:+e.target.value})} style={{width:'100%'}}/></F>
<F l="淨淨營業額"><input type="number" value={editEv.totalRevenue} onChange={e=>setEditEv({...editEv,totalRevenue:+e.target.value})} style={{width:'100%'}}/></F>
<F l="總成本（含運費、分潤）"><input type="number" value={editEv.totalCost} onChange={e=>setEditEv({...editEv,totalCost:+e.target.value})} style={{width:'100%'}}/></F>
<F l="運費（實際）"><input type="number" value={editEv.shipping||0} onChange={e=>setEditEv({...editEv,shipping:+e.target.value})} style={{width:'100%'}}/></F>
</div>
<div className="ib" style={{marginTop:16}}>
利潤預覽：<b style={{color:editEv.totalRevenue-editEv.totalCost>=0?'#059669':'#dc2626'}}>${$(editEv.totalRevenue-editEv.totalCost)}</b>
　毛利率：<b>{P(editEv.totalRevenue>0?(editEv.totalRevenue-editEv.totalCost)/editEv.totalRevenue:0)}</b>
</div>
<div style={{display:'flex',gap:8,justifyContent:'flex-end',marginTop:20}}>
<button className="bs" onClick={()=>setEditEv(null)}>取消</button>
<button className="bp" onClick={saveEdit}>儲存修改</button>
</div></div></div>}
</div>);
}

/* 客戶交易明細（IEA） — 從 recentSales 挑出該客戶的單筆紀錄 */
function ClientTxnDetail({cli,yearF,monthF}){
  const[page,setPage]=useState(0);
  const pSize=50;
  const rows = useMemo(()=>{
    const rs=M.recentSales||[];
    return rs.filter(s=>{
      if(s.cc!==cli.code)return false;
      if(isMaterial(s.pn))return false;
      const y=s.d.slice(0,4),m=s.d.slice(5,7);
      if(yearF!=='all'&&y!==yearF)return false;
      if(monthF!=='all'&&m!==String(monthF).padStart(2,'0'))return false;
      return true;
    }).sort((a,b)=>b.d.localeCompare(a.d));
  },[cli,yearF,monthF]);
  useEffect(()=>{setPage(0)},[cli,yearF,monthF]);
  const total=rows.length;
  const pageCount=Math.ceil(total/pSize);
  const show=rows.slice(page*pSize,(page+1)*pSize);
  const sum=rows.reduce((a,r)=>({q:a.q+r.q,rev:a.rev+r.r,pr:a.pr+r.pr}),{q:0,rev:0,pr:0});
  const periodLabel=(yearF==='all'?'全部':yearF+'年')+(monthF==='all'?'':' '+monthF+'月');
  return(<div className="card" style={{padding:16,marginBottom:16}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8,flexWrap:'wrap',gap:8}}>
      <h3 style={{fontSize:14,fontWeight:600}}>📋 交易明細（{periodLabel}）<span style={{fontSize:11,fontWeight:400,color:'#94a3b8',marginLeft:8}}>共 {total} 筆</span></h3>
      <div style={{fontSize:12,color:'#64748b'}}>合計：數量 {Math.round(sum.q).toLocaleString()} ｜ 營業額 <b>${Math.round(sum.rev).toLocaleString()}</b> ｜ 毛利 <b style={{color:sum.pr>=0?'#059669':'#dc2626'}}>${Math.round(sum.pr).toLocaleString()}</b></div>
    </div>
    {total===0&&<div style={{padding:24,textAlign:'center',color:'#94a3b8',fontSize:12}}>此期間無明細紀錄<br/><span style={{fontSize:11}}>（明細僅涵蓋最近 180 天；如需更早期資料請重跑 master.js）</span></div>}
    {total>0&&<><div style={{maxHeight:420,overflow:'auto',borderRadius:8}}>
      <table style={{fontSize:12,width:'100%',tableLayout:'fixed'}}>
        <colgroup><col style={{width:90}}/><col style={{width:110}}/><col/><col style={{width:70}}/><col style={{width:110}}/><col style={{width:110}}/><col style={{width:80}}/></colgroup>
        <thead><tr>
          <th style={{padding:'6px 10px'}}>日期</th>
          <th style={{padding:'6px 10px'}}>單號</th>
          <th style={{padding:'6px 10px'}}>產品</th>
          <th style={{textAlign:'right',padding:'6px 10px'}}>數量</th>
          <th style={{textAlign:'right',padding:'6px 10px'}}>營業額</th>
          <th style={{textAlign:'right',padding:'6px 10px'}}>毛利</th>
          <th style={{padding:'6px 10px'}}>業務</th>
        </tr></thead>
        <tbody>{show.map((r,i)=><tr key={i}>
          <td style={{padding:'5px 10px',whiteSpace:'nowrap'}}>{r.d}</td>
          <td style={{padding:'5px 10px',fontSize:11,color:'#64748b',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}} title={r.dn}>{r.dn}</td>
          <td style={{padding:'5px 10px',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}} title={r.pn}>{r.pn}</td>
          <td style={{textAlign:'right',padding:'5px 10px'}}>{Math.round(r.q).toLocaleString()}</td>
          <td style={{textAlign:'right',padding:'5px 10px'}}>${Math.round(r.r).toLocaleString()}</td>
          <td style={{textAlign:'right',padding:'5px 10px',color:r.pr>=0?'#059669':'#dc2626'}}>${Math.round(r.pr).toLocaleString()}</td>
          <td style={{padding:'5px 10px',fontSize:11,color:'#64748b',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}} title={r.s}>{r.s}</td>
        </tr>)}</tbody>
      </table>
    </div>
    {pageCount>1&&<div style={{display:'flex',justifyContent:'center',alignItems:'center',gap:8,marginTop:10,fontSize:12}}>
      <button onClick={()=>setPage(Math.max(0,page-1))} disabled={page===0} className="bs" style={{padding:'4px 10px',fontSize:12,opacity:page===0?.5:1}}>上一頁</button>
      <span style={{color:'#64748b'}}>第 {page+1} / {pageCount} 頁</span>
      <button onClick={()=>setPage(Math.min(pageCount-1,page+1))} disabled={page>=pageCount-1} className="bs" style={{padding:'4px 10px',fontSize:12,opacity:page>=pageCount-1?.5:1}}>下一頁</button>
    </div>}
    </>}
  </div>);
}
