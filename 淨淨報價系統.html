<script>
// 密碼用 SHA-256 雜湊驗證，原始碼完全看不到明文密碼
async function sha256(str){
  var buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,'0')}).join('');
}
var _H='35f0fe053efba23746502e427f547856d115174e27c4c1e564f8e050a77f328c';
async function checkPw(){
  var pw=document.getElementById('pw-input').value;
  var h=await sha256(pw);
  if(h===_H){
    document.getElementById('lock-screen').style.display='none';
    sessionStorage.setItem('jj_unlocked','1');
  }else{
    document.getElementById('pw-err').textContent='密碼錯誤，請重新輸入';
    document.getElementById('pw-input').value='';
    document.getElementById('pw-input').focus();
  }
}
if(sessionStorage.getItem('jj_unlocked')==='1'){
  document.getElementById('lock-screen').style.display='none';
}
</script>

(function(){

};

function LD(k,d){
  try{
    // 先試 localStorage
    const s=localStorage.getItem(SK);
    if(s){const o=JSON.parse(s);if(o[k]!==undefined && (Array.isArray(o[k])?o[k].length>0:true))return o[k]}
    // 再試外部資料檔
    if(window.JJ_DATA && window.JJ_DATA[k] && (Array.isArray(window.JJ_DATA[k])?window.JJ_DATA[k].length>0:true))return window.JJ_DATA[k];
    return d;
  }catch(e){return d}
}

function App(){
const[tab,setTab]=useState(0);
const[products,_sP]=useState(()=>LD('p',P0));
const[combos,_sC]=useState(()=>LD('c',C0));
const[clients,_sCl]=useState(()=>LD('cl',CL0));
const[events,_sE]=useState(()=>LD('ev',[]));
const sP=v=>{const n=typeof v==='function'?v(products):v;_sP(n);SV('p',n);markUnsaved()};
const sC=v=>{const n=typeof v==='function'?v(combos):v;_sC(n);SV('c',n);markUnsaved()};
const sCl=v=>{const n=typeof v==='function'?v(clients):v;_sCl(n);SV('cl',n);markUnsaved()};
const sE=v=>{const n=typeof v==='function'?v(events):v;_sE(n);SV('ev',n);markUnsaved()};
const[saved,setSaved]=useState(true);
const[dataSource,setDS]=useState(()=>{
  try{const s=localStorage.getItem(SK);if(s){const o=JSON.parse(s);if(o.ev&&o.ev.length>0)return'localStorage'}
  }catch(e){}
  if(window.JJ_DATA&&window.JJ_DATA.ev&&window.JJ_DATA.ev.length>0)return'外部資料檔';
  return'預設';
});

// 離開頁面前提醒儲存
useEffect(()=>{
  const handler=e=>{if(_unsaved){e.preventDefault();e.returnValue=''}};
  window.addEventListener('beforeunload',handler);
  return()=>window.removeEventListener('beforeunload',handler);
},[]);

/* 儲存資料到外部檔案（data.js）- 支援直接覆蓋寫入，需管理員權限 */
const saveToFile=async()=>{
  // 先在使用者點擊的同步階段取得檔案句柄（避免 user gesture 過期）
  if(window.showOpenFilePicker && !_fileHandle){
    try{
      alert('請選擇報價單資料夾中現有的「data.js」檔案，\n之後每次儲存都會自動覆蓋該檔案。');
      const [fh]=await window.showOpenFilePicker({types:[{description:'JavaScript',accept:{'application/javascript':['.js']}}]});
      _fileHandle=fh;
    }catch(e){
      if(e.name==='AbortError')return;
      console.warn('File System Access API 失敗，改用下載方式',e);
    }
  }
  // 取得檔案句柄後再驗證管理員密碼
  if(!await checkAdmin())return;
  const data={p:products,c:combos,cl:clients,ev:events,savedAt:new Date().toISOString()};
  const content='// 淨淨報價系統 - 資料儲存檔\n// 此檔案由系統自動產生，請勿手動修改\n// 最後更新：'+new Date().toLocaleString('zh-TW')+'\nwindow.JJ_DATA = '+JSON.stringify(data,null,2)+';\n';
  // 優先使用 File System Access API（Chrome/Edge 支援）
  if(_fileHandle){
    try{
      const w=await _fileHandle.createWritable();
      await w.write(content);
      await w.close();
      _unsaved=false;setSaved(true);
      alert('✅ 資料已直接儲存到 data.js！\n重新整理瀏覽器即可載入最新資料。');
      return;
    }catch(e){
      console.warn('寫入失敗，改用下載方式',e);
      _fileHandle=null;
    }
  }
  // 降級：傳統下載方式
  const blob=new Blob([content],{type:'application/javascript;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='data.js';a.click();
  _unsaved=false;setSaved(true);
  alert('資料已儲存！\n\n⚠️ 重要：請將下載的「data.js」存到和「淨淨報價系統.html」同一個資料夾（報價單），覆蓋舊檔案。\n\n這樣下次開啟 HTML 時資料就會自動載入。');
};
/* 匯出 JSON 備份 */
const exportData=()=>{
  const data={p:products,c:combos,cl:clients,ev:events,exportDate:new Date().toISOString()};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='淨淨報價資料_備份_'+new Date().toISOString().slice(0,10)+'.json';a.click();
};
const importData=async()=>{
  if(!await checkAdmin())return;
  const input=document.createElement('input');input.type='file';input.accept='.json,.js';
  input.onchange=e=>{const f=e.target.files[0];if(!f)return;
    const reader=new FileReader();reader.onload=ev=>{
      try{
        let d;
        const txt=ev.target.result;
        if(txt.includes('window.JJ_DATA')){
          // 從 .js 檔案解析
          const match=txt.match(/window\.JJ_DATA\s*=\s*(\{[\s\S]*\});/);
          if(match)d=JSON.parse(match[1]);
        }else{d=JSON.parse(txt)}
        if(!d)throw new Error('格式錯誤');
        if(d.p&&d.p.length)sP(d.p);if(d.c&&d.c.length)sC(d.c);if(d.cl&&d.cl.length)sCl(d.cl);if(d.ev)sE(d.ev);
        setSaved(true);_unsaved=false;
        alert('資料匯入成功！共 '+(d.ev||[]).length+' 筆場次、'+(d.cl||[]).length+' 個客戶');
      }catch(err){alert('匯入失敗：檔案格式錯誤')}
    };reader.readAsText(f)};
  input.click();
};

function F({l,children}){return <div><label style={{fontSize:12,color:'#64748b'}}>{l}</label><br/>{children}</div>}
function Modal({title,onClose,w,children}){
return(<div className="mo" onClick={onClose}><div className="mc" style={{maxWidth:w||800}} onClick={e=>e.stopPropagation()}>
<h3 style={{fontSize:18,fontWeight:600,marginBottom:16}}>{title}</h3>
{typeof children==='function'?children(onClose):children}
</div></div>);
}

/* ==================== 1. 產品主表 ==================== */
function T1({products,sP}){
const[s,setS]=useState('');const[cf,setCf]=useState('全部');const[eid,setEid]=useState(null);const[ed,setEd]=useState({});const[sa,setSa]=useState(false);
const cats=['全部',...new Set(products.map(p=>p.cat))];
const fl=products.filter(p=>p.name.includes(s)&&(cf==='全部'||p.cat===cf));
return(<div>
<div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16,flexWrap:'wrap',gap:12}}>
<div style={{display:'flex',gap:12,alignItems:'center',flexWrap:'wrap'}}>
<input type="text" placeholder="&#128269; 搜尋產品..." value={s} onChange={e=>setS(e.target.value)} style={{width:220}}/>
<select value={cf} onChange={e=>setCf(e.target.value)} style={{minWidth:120}}>{cats.map(c=><option key={c}>{c}</option>)}</select>
</div>
<button className="bp" onClick={()=>setSa(true)}>+ 新增產品</button>
</div>
<div className="card" style={{overflow:'auto'}}><table><thead><tr>
<th>分類</th><th>產品名稱</th><th>定價</th><th>零售價</th><th style={{background:'#fff7ed'}}>經銷價</th><th style={{background:'#e6f7fa'}}>特約價</th><th style={{background:'#fef3c7'}}>特殊價</th><th>成本</th><th>毛利率(特殊)</th><th>操作</th>
</tr></thead><tbody>
{fl.map(p=>{const mg=p.sp>0?(p.sp-p.cost)/p.sp:0;
if(eid===p.id)return(<tr key={p.id} style={{background:'#e6f7fa'}}>
<td><input type="text" value={ed.cat} onChange={e=>setEd({...ed,cat:e.target.value})} style={{width:70}}/></td>
<td><input type="text" value={ed.name} onChange={e=>setEd({...ed,name:e.target.value})} style={{width:180}}/></td>
<td><input type="number" value={ed.retail} onChange={e=>setEd({...ed,retail:+e.target.value})} style={{width:70}}/></td>
<td><input type="number" value={ed.rp} onChange={e=>setEd({...ed,rp:+e.target.value})} style={{width:70}}/></td>
<td><input type="number" value={ed.dp} onChange={e=>setEd({...ed,dp:+e.target.value})} style={{width:70}}/></td>
<td><input type="number" value={ed.cp} onChange={e=>setEd({...ed,cp:+e.target.value})} style={{width:70}}/></td>
<td><input type="number" value={ed.sp} onChange={e=>setEd({...ed,sp:+e.target.value})} style={{width:70}}/></td>
<td><input type="number" step=".01" value={ed.cost} onChange={e=>setEd({...ed,cost:+e.target.value})} style={{width:70}}/></td>
<td></td>
<td><button className="bp" onClick={()=>{sP(products.map(x=>x.id===eid?{...ed}:x));setEid(null)}} style={{fontSize:12,padding:'4px 10px'}}>儲存</button></td>
</tr>);
return(<tr key={p.id}>
<td><span className="tag tbl">{p.cat}</span></td>
<td style={{fontWeight:500}}>{p.name}</td>
<td>${$(p.retail)}</td>
<td>${$(p.rp||0)}</td>
<td style={{background:'#fff7ed'}}>${$(p.dp||0)}</td>
<td style={{background:'#e6f7fa'}}>${$(p.cp||0)}</td>
<td style={{background:'#fef3c7',fontWeight:600}}>${$(p.sp||0)}</td>
<td>${$(p.cost)}</td>
<td><span className={C(mg)}>{P(mg)}</span></td>

:

/* ==================== 3. 報價試算 ==================== */
function T3({products,combos,clients,sCl,events,sE}){
const[cid,setCid]=useState(clients[0]?.id||0);
const[eName,setEN]=useState('');
const[eDate,setED]=useState(new Date().toISOString().slice(0,10));
const[rows,setRows]=useState([]);
const[shipMode,setSM]=useState('lump');
const[shipLump,setSL]=useState(0);
const[shipPer,setSP]=useState(150);
const[showAC,setSAC]=useState(false);
const[tierF,setTierF]=useState('all');
const[clQ,setClQ]=useState('');
const filteredCl=useMemo(()=>clients.filter(c=>{
  if(tierF!=='all'&&c.tier!==tierF)return false;
  if(clQ&&!c.name.toLowerCase().includes(clQ.toLowerCase()))return false;
  return true;
}),[clients,tierF,clQ]);
const[evComm,setEvComm]=useState(null);

const cl=clients.find(c=>c.id===cid);
const tier=cl?.tier||'cp';
const tierLabel={'dp':'經銷價','cp':'特約價','sp':'特殊價'}[tier]||'特約價';
const comm=evComm!==null?evComm:(cl?.commission||0);
useEffect(()=>{setEvComm(null)},[cid]);

const addR=t=>setRows([...rows,t==='s'?{type:'s',pid:products[0]?.id,qty:100,lp:0,clp:false,cpo:0,ccp:false}:{type:'c',cid:combos[0]?.id,qty:100,lp:0,clp:false,cpo:0,ccp:false}]);
const upR=(i,u)=>setRows(rows.map((r,j)=>j===i?{...r,...u}:r));
const rmR=i=>setRows(rows.filter((_,j)=>j!==i));

const calcR=row=>{
  let dCp=0,unitCost=0,name='',dLive=0,dRetail=0;
  if(row.type==='s'){
    const p=products.find(x=>x.id===row.pid);if(!p)return{};
    name=p.name;dCp=p[tier]||p.cp;unitCost=p.cost;dLive=p.retail;dRetail=p.retail;
  }else{
    const c=combos.find(x=>x.id===row.cid);if(!c)return{};
    name=c.name;dCp=c[tier]||0;dRetail=c.retail||0;dLive=dRetail;
    c.items.forEach(it=>{const p=products.find(x=>x.id===it.pid);if(p){unitCost+=p.cost*it.qty;if(!dRetail)dLive+=p.retail*it.qty;if(!dCp)dCp+=(p[tier]||p.cp)*it.qty}});
  }
  const cp=row.ccp?row.cpo:dCp;
  const lp=row.clp?row.lp:dLive;
  const retail=dRetail||dLive;
  const totalCost=unitCost*row.qty;
  const perShip=shipMode==='perItem'?shipPer*row.qty:0;
  const vendorProfit=lp-cp;
  const vendorMargin=lp>0?vendorProfit/lp:0;
  const netRevenue=cp*row.qty;
  const commAmt=comm>0?netRevenue*comm:0;
  const netProfit=netRevenue-totalCost-commAmt-perShip;
  const netMargin=netRevenue>0?netProfit/netRevenue:0;
  return{name,cp,dCp,lp,dLive,retail,vendorProfit,vendorMargin,netRevenue,totalCost,netProfit,netMargin,commAmt,perShip};
};

const sum=useMemo(()=>{
  let rev=0,cost=0,profit=0,comT=0,shipT=0;
  rows.forEach(r=>{const c=calcR(r);rev+=c.netRevenue||0;cost+=c.totalCost||0;profit+=c.netProfit||0;comT+=c.commAmt||0;shipT+=c.perShip||0});
  if(shipMode==='lump'){profit-=shipLump}
  const totalCostAll=cost+comT+(shipMode==='lump'?shipLump:shipT);
  return{rev,totalCostAll,profit,margin:rev>0?profit/rev:0,comT,shipT};
},[rows,shipMode,shipLump,shipPer,cid,evComm]);

const saveEv=()=>{
  if(!eName){alert('請輸入場次名稱');return}
  const d=eDate?new Date(eDate):new Date();
  const totalShip=shipMode==='lump'?shipLump:sum.shipT;
  const ev={id:Date.now(),name:eName,client:cl?.name||'',commission:comm,
    date:eDate,year:d.getFullYear(),month:d.getMonth()+1,
    totalRevenue:sum.rev,totalCost:sum.totalCostAll,totalProfit:sum.profit,totalMargin:sum.margin,
    shipping:totalShip,shipMode,
    rows:rows.map(r=>({...r,calc:calcR(r)}))};
  sE([...events,ev]);
  alert('已儲存至場次總表！');
};

const addCl=data=>{const nid=Math.max(0,...clients.map(c=>c.id))+1;sCl([...clients,{...data,id:nid}]);setCid(nid);setSAC(false)};
const editCl=(id,data)=>{sCl(clients.map(c=>c.id===id?{...c,...data}:c))};
const delCl=id=>{if(!confirm('確定刪除此客戶？'))return;sCl(clients.filter(c=>c.id!==id));if(cid===id)setCid(clients[0]?.id||0)};
const[showEC,setSEC]=useState(false);
const[editClData,setECD]=useState(null);

const hasComm=comm>0;
const colSpan=hasComm?14:13;

return(<div>
<div className="card" style={{padding:20,marginBottom:16}}>
<div style={{display:'flex',gap:16,alignItems:'flex-end',flexWrap:'wrap'}}>
<F l="場次名稱"><input type="text" placeholder="例：11504月直播" value={eName} onChange={e=>setEN(e.target.value)} style={{width:180}}/></F>
<F l="日期"><input type="text" placeholder="YYYY-MM-DD" value={eDate} onChange={e=>setED(e.target.value)} style={{width:120}}/></F>
<F l="廠商類型"><select value={tierF} onChange={e=>{setTierF(e.target.value);setClQ('')}} style={{minWidth:100}}>
<option value="all">全部</option><option value="dp">經銷商</option><option value="cp">特約商</option><option value="sp">特殊</option>
</select></F>
<F l="搜尋廠商"><input type="text" placeholder="輸入名稱搜尋..." value={clQ} onChange={e=>setClQ(e.target.value)} style={{width:140}}/></F>
<F l="廠商名稱"><div style={{display:'flex',gap:4}}>
<select value={cid} onChange={e=>setCid(+e.target.value)} style={{minWidth:150}}>
{filteredCl.map(c=><option key={c.id} value={c.id}>{c.name}{c.commission>0?` (${(c.commission*100)}%)`:''}</option>)}
{filteredCl.length===0&&<option value="">無符合廠商</option>}
</select>
<button className="bs" onClick={()=>setSAC(true)} style={{fontSize:12,padding:'4px 8px'}}>+</button>
{cl&&<button className="bs" onClick={()=>{setECD({...cl});setSEC(true)}} style={{fontSize:12,padding:'4px 8px'}}>✏️</button>}
{cl&&clients.length>1&&<button className="bd" onClick={()=>delCl(cl.id)} style={{fontSize:12,padding:'4px 8px'}}>🗑</button>}</div></F>
{cl&&cl.commission>0&&<F l={`本場分潤（預設${(cl.commission*100)}%）`}>
<input type="number" step=".01" value={evComm!==null?evComm:cl.commission} onChange={e=>setEvComm(+e.target.value)} style={{width:80}}/></F>}
</div>
<div style={{display:'flex',gap:16,alignItems:'flex-end',flexWrap:'wrap',marginTop:12,paddingTop:12,borderTop:'1px solid #e2e8f0'}}>
<F l="運費模式"><select value={shipMode} onChange={e=>setSM(e.target.value)} style={{minWidth:180}}>
<option value="lump">一筆總運費</option><option value="perItem">每品項加運費（試算用）</option></select></F>
{shipMode==='lump'?<F l="運費總額"><input type="number" value={shipLump} onChange={e=>setSL(+e.target.value)} style={{width:120}}/></F>
:<F l="每品項運費"><input type="number" value={shipPer} onChange={e=>setSP(+e.target.value)} style={{width:100}}/></F>}
{shipMode==='perItem'&&<div style={{fontSize:12,color:'#d97706',paddingBottom:6}}>* 每組加 ${shipPer}，結束後可在場次總表改為實際運費</div>}
</div>
{cl&&<div className="ib" style={{marginTop:12}}><b>{cl.name}</b><span style={{background:'#e6f7fa',color:'#1a6a75',padding:'2px 8px',borderRadius:4,fontSize:12,marginLeft:8}}>{tierLabel}</span>{hasComm&&<span> · 本場分潤 {(comm*100).toFixed(0)}%</span>}{cl.note&&<span style={{color:'#64748b'}}> · {cl.note}</span>}</div>}
</div>

<div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:16}}>
<div className="sc s2"><div style={{fontSize:12,opacity:.9}}>淨淨營業額</div><div style={{fontSize:22,fontWeight:700}}>${$(sum.rev)}</div></div>
<div className="sc s4"><div style={{fontSize:12,opacity:.9}}>總成本{hasComm?'(含分潤)':''}</div><div style={{fontSize:22,fontWeight:700}}>${$(sum.totalCostAll)}</div></div>
<div className="sc s3"><div style={{fontSize:12,opacity:.9}}>淨淨利潤</div><div style={{fontSize:22,fontWeight:700}}>${$(sum.profit)}</div></div>
<div className="sc s1"><div style={{fontSize:12,opacity:.9}}>淨淨毛利率</div><div style={{fontSize:22,fontWeight:700}}>{P(sum.margin)}</div></div>
</div>

<div style={{display:'flex',gap:8,marginBottom:12}}>
<button className="bp" onClick={()=>addR('s')}>+ 加單品</button>
<button className="bp" onClick={()=>addR('c')}>+ 加組合</button>
<div style={{flex:1}}/>
<button className="bg" onClick={saveEv}>&#128190; 儲存為場次紀錄</button>
</div>

<div className="card" style={{overflow:'auto'}}><table><thead><tr>
<th>類型</th><th>品項</th><th>組數</th><th>官網價</th>
<th className="eh">直播價 &#9998;</th><th className="eh">{tierLabel} &#9998;</th>
<th>廠商利潤</th><th>廠商毛利</th>
<th>淨淨營業額</th><th>淨淨成本</th>
{hasComm&&<th>分潤</th>}
{shipMode==='perItem'&&<th>運費</th>}
<th>淨淨利潤</th><th>毛利率</th><th></th>
</tr></thead><tbody>
{rows.map((r,i)=>{const c=calcR(r);return(
<tr key={i}>
<td><span className={`tag ${r.type==='s'?'tbl':'tgr'}`}>{r.type==='s'?'單品':'組合'}</span></td>
<td>{r.type==='s'
  ?<select value={r.pid} onChange={e=>upR(i,{pid:+e.target.value,clp:false,ccp:false})} style={{minWidth:200}}>{products.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}</select>
  :<select value={r.cid} onChange={e=>upR(i,{cid:+e.target.value,clp:false,ccp:false})} style={{minWidth:200}}>{combos.map(cb=><option key={cb.id} value={cb.id}>{cb.name}</option>)}</select>}</td>

    else{const p=products.find(x=>x.id===id);if(!p)return null;name=p.name;cp=p.sp||p.cp;cost=p.cost;retail=p.retail}
    const profit=cp-cost,mg=cp>0?profit/cp:0,sCp=Math.round(retail*sim),sP=sCp-cost,sM=sCp>0?sP/sCp:0;

  <input type="range" min={.3} max={1} step={.01} value={sim} onChange={e=>setSim(+e.target.value)}/>

  {[...data].sort((a,b)=>b.sM-a.sM).map(d=>{const mx=Math.max(1,...data.map(x=>Math.abs(x.sP)));return(
  <div key={d.id} style={{display:'flex',alignItems:'center',gap:12,marginBottom:8}}>
  <span style={{width:220,fontSize:13,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{d.name}</span>
  <span style={{width:90,fontSize:12,color:'#64748b'}}>模擬 ${$(d.sCp)}</span>
  <div style={{flex:1}}><div className="bar-c"><div className="bar-f" style={{width:Math.max(2,d.sP>0?(d.sP/mx*100):2)+'%',background:d.sM>=.35?'#10b981':d.sM>=.2?'#f59e0b':'#ef4444'}}/></div></div>
  <span style={{width:60,textAlign:'right',fontSize:13}} className={C(d.sM)}>{P(d.sM)}</span>
  <span style={{width:90,textAlign:'right',fontSize:12,color:d.sP>=0?'#059669':'#dc2626'}}>利潤 ${$(d.sP)}</span>
  </div>)})}
  </div>
  <div className="card" style={{overflow:'auto'}}><table><thead><tr>

  </tr></thead><tbody>{data.map(d=><tr key={d.id}>
  <td style={{fontWeight:500}}>{d.name}</td><td>${$(d.retail)}</td><td style={{fontWeight:600}}>${$(d.cp)}</td><td>${$(d.cost)}</td>
  <td style={{fontWeight:600,color:d.profit>=0?'#059669':'#dc2626'}}>${$(d.profit)}</td><td><span className={C(d.mg)}>{P(d.mg)}</span></td>
  <td style={{background:'#fffbeb',fontWeight:500}}>${$(d.sCp)}</td><td style={{background:'#fffbeb',color:d.sP>=0?'#059669':'#dc2626',fontWeight:600}}>${$(d.sP)}</td>
  <td style={{background:'#fffbeb'}}><span className={C(d.sM)}>{P(d.sM)}</span></td></tr>)}</tbody></table></div>
  </>}
  {sel.length===0&&<div className="card" style={{padding:40,textAlign:'center',color:'#94a3b8'}}>選擇品項即可看利潤排名和模擬</div>}
  </div>);
}

return(<div>
<div style={{display:'flex',gap:6,marginBottom:16}}>
{subs.map((s,i)=><button key={i} onClick={()=>setSub(i)} style={{padding:'8px 18px',borderRadius:8,border:'none',cursor:'pointer',fontWeight:500,fontSize:14,background:sub===i?'#3EBAC8':'#e2f0f1',color:sub===i?'#fff':'#3a7a82'}}>{s}</button>)}
</div>
{sub===0&&<ViewDashboard/>}
{sub===1&&<ViewVendorPerf/>}
{sub===2&&<ViewPriceSim/>}
</div>);
}

/* ==================== 明細編輯元件 ==================== */
function DetailModal({detail,setDetail,dlD,events,sE}){
const[rows,setRows]=useState(()=>detail.rows.map(r=>({...r,calc:{...r.calc}})));
const[ship,setShip]=useState(detail.shipping||0);
const[comm,setComm]=useState(detail.commission||0);

const upRow=(i,field,val)=>{
  setRows(rows.map((r,j)=>{
    if(j!==i)return r;
    const nr={...r,calc:{...r.calc}};
    nr.calc[field]=val;
    // recalc row profits
    const c=nr.calc;
    c.vendorProfit=(c.lp||0)-(c.cp||0);
    c.vendorMargin=c.lp>0?c.vendorProfit/c.lp:0;
    c.netRevenue=(c.cp||0)*(nr.qty||0);
    c.totalCost=(c.unitCost||(c.totalCost/(nr.qty||1)))*(nr.qty||0);
    const commAmt=comm>0?c.netRevenue*comm:0;
    c.commAmt=commAmt;
    c.netProfit=c.netRevenue-c.totalCost-commAmt;
    c.netMargin=c.netRevenue>0?c.netProfit/c.netRevenue:0;
    return nr;
  }));
};

const upQty=(i,qty)=>{
  setRows(rows.map((r,j)=>{
    if(j!==i)return r;
    const nr={...r,qty};const c={...r.calc};
    c.netRevenue=(c.cp||0)*qty;
    const oldQty=r.qty||1;const unitCost=(c.totalCost||0)/oldQty;
    c.totalCost=unitCost*qty;
    const commAmt=comm>0?c.netRevenue*comm:0;
    c.commAmt=commAmt;
    c.netProfit=c.netRevenue-c.totalCost-commAmt;
    c.netMargin=c.netRevenue>0?c.netProfit/c.netRevenue:0;
    nr.calc=c;return nr;
  }));
};

const totals=useMemo(()=>{
  let rev=0,cost=0,comT=0;
  rows.forEach(r=>{const c=r.calc||{};rev+=c.netRevenue||0;cost+=c.totalCost||0;comT+=c.commAmt||0});
  const totalCost=cost+comT+ship;
  const profit=rev-totalCost;
  const margin=rev>0?profit/rev:0;
  return{rev,totalCost,profit,margin,comT};
},[rows,ship,comm]);

const saveDetail=()=>{
  const updated={...detail,rows,shipping:ship,commission:comm,
    totalRevenue:totals.rev,totalCost:totals.totalCost,totalProfit:totals.profit,totalMargin:totals.margin};
  sE(events.map(e=>e.id===detail.id?updated:e));
  setDetail(null);
  alert('明細已更新！');
};

return(<div className="mo" onClick={()=>setDetail(null)}>
<div className="mc" style={{maxWidth:1100}} onClick={e=>e.stopPropagation()}>
<div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
<div><h3 style={{fontSize:18,fontWeight:600}}>{detail.name} - 明細編輯</h3>
<span style={{fontSize:13,color:'#64748b'}}>{detail.client}{comm>0?` · 分潤${(comm*100).toFixed(0)}%`:''} | {detail.date}</span></div>
<div style={{display:'flex',gap:8}}>
<button className="bg" onClick={()=>dlD({...detail,rows,shipping:ship,commission:comm,totalRevenue:totals.rev,totalCost:totals.totalCost,totalProfit:totals.profit,totalMargin:totals.margin},'full')} style={{fontSize:12}}>&#128229; 完整版</button>
<button className="bw" onClick={()=>dlD({...detail,rows,shipping:ship,commission:comm,totalRevenue:totals.rev,totalCost:totals.totalCost,totalProfit:totals.profit,totalMargin:totals.margin},'vendor')} style={{fontSize:12}}>&#128229; 廠商版</button>
<button className="bs" onClick={()=>setDetail(null)}>關閉</button></div></div>

<div style={{display:'flex',gap:12,marginBottom:16,flexWrap:'wrap'}}>
<F l="運費（實際）"><input type="number" value={ship} onChange={e=>setShip(+e.target.value)} style={{width:120}}/></F>
<F l="分潤比例"><input type="number" step=".01" value={comm} onChange={e=>setComm(+e.target.value)} style={{width:100}}/></F>
</div>

<div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:16}}>
<div style={{background:'#f0f4f8',borderRadius:8,padding:12,textAlign:'center'}}><div style={{fontSize:12,color:'#64748b'}}>營業額</div><div style={{fontSize:18,fontWeight:700}}>${$(totals.rev)}</div></div>
<div style={{background:'#f0fdf4',borderRadius:8,padding:12,textAlign:'center'}}><div style={{fontSize:12,color:'#64748b'}}>利潤</div><div style={{fontSize:18,fontWeight:700,color:totals.profit>=0?'#059669':'#dc2626'}}>${$(totals.profit)}</div></div>
<div style={{background:'#fffbeb',borderRadius:8,padding:12,textAlign:'center'}}><div style={{fontSize:12,color:'#64748b'}}>運費</div><div style={{fontSize:18,fontWeight:700}}>${$(ship)}</div></div>
<div style={{background:'#fef2f2',borderRadius:8,padding:12,textAlign:'center'}}><div style={{fontSize:12,color:'#64748b'}}>毛利率</div><div style={{fontSize:18,fontWeight:700}}>{P(totals.margin)}</div></div>
</div>

<div style={{overflow:'auto'}}><table><thead><tr>
<th>品項</th><th style={{background:'#fffbeb'}}>組數</th><th>官網價</th>
<th style={{background:'#fffbeb'}}>直播價</th><th style={{background:'#fffbeb'}}>進貨價</th>
<th style={{background:'#e6f7fa'}}>廠商利潤</th><th style={{background:'#e6f7fa'}}>廠商毛利</th>
<th>淨淨營業額</th><th>淨淨成本</th><th>淨淨利潤</th><th>毛利率</th>
</tr></thead><tbody>
{rows.map((r,i)=>{const c=r.calc||{};return(
<tr key={i}>
<td style={{fontWeight:500}}>{c.name}</td>
<td style={{background:'#fffbeb'}}><input type="number" value={r.qty} onChange={e=>upQty(i,+e.target.value)} style={{width:60,padding:'2px 4px',fontSize:13}}/></td>
<td style={{color:'#64748b'}}>${$(c.retail)}</td>
<td style={{background:'#fffbeb'}}><input type="number" value={Math.round(c.lp||0)} onChange={e=>upRow(i,'lp',+e.target.value)} style={{width:70,padding:'2px 4px',fontSize:13}}/></td>
<td style={{background:'#fffbeb'}}><input type="number" value={Math.round(c.cp||0)} onChange={e=>upRow(i,'cp',+e.target.value)} style={{width:70,padding:'2px 4px',fontSize:13}}/></td>
<td style={{background:'#f8fafc',color:c.vendorProfit>=0?'#059669':'#dc2626'}}>${$(c.vendorProfit)}</td>
<td style={{background:'#f8fafc'}}><span className={C(c.vendorMargin)}>{P(c.vendorMargin)}</span></td>
<td>${$(c.netRevenue)}</td><td>${$(c.totalCost)}</td>
<td style={{fontWeight:600,color:c.netProfit>=0?'#059669':'#dc2626'}}>${$(c.netProfit)}</td>
<td><span className={C(c.netMargin)}>{P(c.netMargin)}</span></td>
</tr>)})}
</tbody></table></div>

<div style={{display:'flex',gap:8,justifyContent:'flex-end',marginTop:20}}>
<button className="bs" onClick={()=>setDetail(null)}>取消</button>
<button className="bp" onClick={saveDetail}>儲存修改</button>
</div>
</div></div>);
}

/* ==================== 5. 場次總表（可編輯）==================== */
function T5({events,sE,products,combos}){
const[yF,setYF]=useState('全部');const[mF,setMF]=useState('全部');const[cF,setCF]=useState('全部');
const[detail,setDetail]=useState(null);const[editEv,setEditEv]=useState(null);

const ys=['全部',...new Set(events.map(e=>e.year))];
const ms=['全部',...[...new Set(events.map(e=>e.month))].sort((a,b)=>a-b)];
const cs=['全部',...new Set(events.map(e=>e.client))];
const fl=events.filter(e=>(yF==='全部'||e.year===+yF)&&(mF==='全部'||e.month===+mF)&&(cF==='全部'||e.client===cF));
const tot=fl.reduce((a,e)=>({r:a.r+e.totalRevenue,c:a.c+e.totalCost,p:a.p+e.totalProfit}),{r:0,c:0,p:0});
tot.m=tot.r>0?tot.p/tot.r:0;

const dl=async(list,name,mode)=>{try{window._dlXlsx(list,name,mode)}catch(e){console.error(e);alert('下載失敗：'+e.message)}};
const ts=new Date().toISOString().slice(0,10);
const dlAllFull=()=>dl(fl,'淨淨場次總表_完整版_'+ts,'full');
const dlAllVendor=()=>dl(fl,'淨淨場次總表_廠商版_'+ts,'vendor');
const dlD=(ev,mode)=>dl([ev],(ev.name||'報價明細')+'_'+(mode==='vendor'?'廠商版':'完整版'),mode||'full');

const deleteEv=id=>{if(confirm('確定刪除此場次？'))sE(events.filter(e=>e.id!==id))};

const saveEdit=()=>{
  if(!editEv)return;
  // Recalc totals
  const rev=editEv.totalRevenue;const cost=editEv.totalCost;
  const profit=rev-cost;const margin=rev>0?profit/rev:0;
  sE(events.map(e=>e.id===editEv.id?{...editEv,totalProfit:profit,totalMargin:margin}:e));
  setEditEv(null);
};

if(!events.length)return(<div className="card" style={{padding:40,textAlign:'center',color:'#94a3b8'}}>
<p style={{fontSize:16,marginBottom:8}}>尚無場次紀錄</p><p style={{fontSize:13}}>在「報價試算」儲存後即可在此查看</p></div>);

return(<div>
<h2 style={{fontSize:18,fontWeight:600,marginBottom:16}}>場次總表彙整</h2>
<div className="card" style={{padding:16,marginBottom:16}}>
<div style={{display:'flex',gap:16,alignItems:'flex-end',flexWrap:'wrap'}}>
<F l="年度"><select value={yF} onChange={e=>setYF(e.target.value)} style={{minWidth:100}}>{ys.map(y=><option key={y} value={y}>{y==='全部'?'全部':y+'年'}</option>)}</select></F>
<F l="月份"><select value={mF} onChange={e=>setMF(e.target.value)} style={{minWidth:100}}>{ms.map(m=><option key={m} value={m}>{m==='全部'?'全部':m+'月'}</option>)}</select></F>
<F l="廠商"><select value={cF} onChange={e=>setCF(e.target.value)} style={{minWidth:100}}>{cs.map(c=><option key={c} value={c}>{c}</option>)}</select></F>
<div style={{flex:1}}/>
<button className="bg" onClick={dlAllFull} style={{marginRight:8}}>&#128229; 完整版下載</button>
<button className="bw" onClick={dlAllVendor}>&#128229; 廠商版下載</button>
</div></div>

<div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:16}}>
<div className="sc s1"><div style={{fontSize:12,opacity:.9}}>篩選場次</div><div style={{fontSize:28,fontWeight:700}}>{fl.length}</div></div>
<div className="sc s2"><div style={{fontSize:12,opacity:.9}}>累計營業額</div><div style={{fontSize:22,fontWeight:700}}>${$(tot.r)}</div></div>
<div className="sc s3"><div style={{fontSize:12,opacity:.9}}>累計利潤</div><div style={{fontSize:22,fontWeight:700}}>${$(tot.p)}</div></div>
<div className="sc s4"><div style={{fontSize:12,opacity:.9}}>平均毛利率</div><div style={{fontSize:22,fontWeight:700}}>{P(tot.m)}</div></div>
</div>

<div className="card" style={{overflow:'auto'}}><table><thead><tr>
<th>場次</th><th>廠商</th><th>日期</th><th>營業額</th><th>成本</th><th>運費</th><th>利潤</th><th>毛利率</th><th>操作</th>
</tr></thead><tbody>
{fl.map(e=>(
<tr key={e.id}>
<td style={{fontWeight:500}}>{e.name}</td>
<td><span className="tag tbl">{e.client}</span>{e.commission>0&&<span style={{fontSize:11,color:'#d97706',marginLeft:4}}>({(e.commission*100).toFixed(0)}%)</span>}</td>
<td>{e.date}</td>
<td>${$(e.totalRevenue)}</td><td>${$(e.totalCost)}</td><td>${$(e.shipping||0)}</td>
<td style={{fontWeight:600,color:e.totalProfit>=0?'#059669':'#dc2626'}}>${$(e.totalProfit)}</td>
<td><span className={C(e.totalMargin)}>{P(e.totalMargin)}</span></td>
<td style={{whiteSpace:'nowrap'}}>
<button className="bp" onClick={()=>setDetail(e)} style={{fontSize:12,padding:'4px 10px',marginRight:4}}>明細</button>
<button className="bw" onClick={()=>setEditEv({...e})} style={{fontSize:12,padding:'4px 10px',marginRight:4}}>編輯</button>
<button className="bs" onClick={()=>dlD(e,'full')} style={{fontSize:12,padding:'4px 8px',marginRight:2}} title="完整版">&#128229;</button>
<button style={{fontSize:12,padding:'4px 8px',marginRight:4,background:'#fef3c7',border:'1px solid #f59e0b',borderRadius:8,cursor:'pointer'}} onClick={()=>dlD(e,'vendor')} title="廠商版">&#128230;</button>
<button className="bd" onClick={()=>deleteEv(e.id)} style={{fontSize:12}}>刪除</button>
</td></tr>))}
</tbody></table></div>

{/* 明細 Modal（可編輯） */}
{detail&&<DetailModal detail={detail} setDetail={setDetail} dlD={dlD} events={events} sE={sE}/>}

{/* 編輯 Modal */}
{editEv&&<div className="mo" onClick={()=>setEditEv(null)}>
<div className="mc" style={{maxWidth:600}} onClick={e=>e.stopPropagation()}>
<h3 style={{fontSize:18,fontWeight:600,marginBottom:16}}>編輯場次：{editEv.name}</h3>
<div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
<F l="場次名稱"><input type="text" value={editEv.name} onChange={e=>setEditEv({...editEv,name:e.target.value})} style={{width:'100%'}}/></F>
<F l="日期"><input type="text" value={editEv.date} onChange={e=>setEditEv({...editEv,date:e.target.value})} style={{width:'100%'}}/></F>
<F l="廠商"><input type="text" value={editEv.client} onChange={e=>setEditEv({...editEv,client:e.target.value})} style={{width:'100%'}}/></F>
<F l="分潤比例"><input type="number" step=".01" value={editEv.commission||0} onChange={e=>setEditEv({...editEv,commission:+e.target.value})} style={{width:'100%'}}/></F>
<F l="淨淨營業額"><input type="number" value={editEv.totalRevenue} onChange={e=>setEditEv({...editEv,totalRevenue:+e.target.value})} style={{width:'100%'}}/></F>
<F l="總成本（含運費、分潤）"><input type="number" value={editEv.totalCost} onChange={e=>setEditEv({...editEv,totalCost:+e.target.value})} style={{width:'100%'}}/></F>
<F l="運費（實際）"><input type="number" value={editEv.shipping||0} onChange={e=>setEditEv({...editEv,shipping:+e.target.value})} style={{width:'100%'}}/></F>
</div>
<div className="ib" style={{marginTop:16}}>
利潤預覽：<b style={{color:editEv.totalRevenue-editEv.totalCost>=0?'#059669':'#dc2626'}}>${$(editEv.totalRevenue-editEv.totalCost)}</b>
　毛利率：<b>{P(editEv.totalRevenue>0?(editEv.totalRevenue-editEv.totalCost)/editEv.totalRevenue:0)}</b>
</div>
<div style={{display:'flex',gap:8,justifyContent:'flex-end',marginTop:20}}>
<button className="bs" onClick={()=>setEditEv(null)}>取消</button>
<button className="bp" onClick={saveEdit}>儲存修改</button>
</div></div></div>}
</div>);
}

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
